ne 2022)** defines the semantics shared by all HTTP versions; **HTTP/1.1 (9112)**, **HTTP/2 (9113)** and **HTTP/3 (9114)** are separate specs for representing and transporting them.\n\n# Why it matters (document's key lesson)\n**GET, POST, status codes, headers, caching and resource semantics are the enduring contract.** Versions are just different ways of carrying it — so *standardise durable semantics and outcomes, not incidental infrastructure*.\n\n# Evaluation\nAccurate and well-used as a conceptual anchor. Relates to: [HTTP/3](http-3.md), [Six shifts](../document/themes/six-shifts.md).\n\n# Terms\nGlossary terms used here: [Semantic interoperability](../glossary/semantic-interoperability.md)."},"standards/index.md":{"type":"Index","title":"Standards & specifications","description":"Protocols, formats and specs cited in the timeline — each verified against its primary source.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"standards","body":"# Standards & specifications\n\nProtocols, formats and specs cited in the timeline — each verified against its primary source.\n\n- [HTTP/0.9 (1991)](http-0-9.md) — The original, minimal HTTP: a request for a document followed by the document itself.\n- [HTTP/1.0 — RFC 1945 (May 1996)](http-1-0.md) — First documented HTTP: MIME-like messages, headers, metadata, content types, richer semantics.\n- [XML 1.0 (W3C, Feb 1998)](xml.md) — Structured, extensible markup underpinning SOAP/WSDL-era web services.\n- [HTTP/1.1 — RFC 2068 / 2616 / 9112](http-1-1.md) — Made the Web scalable: caching, persistent connections, intermediaries, content negotiation.\n- [SOAP 1.1 (W3C Note, May 2000)](soap.md) — Message- and operation-oriented web-service protocol.\n- [REST — Fielding dissertation (2000)](rest.md) — Architectural style of constraints, not a synonym for JSON endpoints.\n- [WSDL 1.1 (W3C Note, March 2001)](wsdl.md) — Operation-oriented service-definition language for web services.\n- [OAuth 2.0 — RFC 6749 (2012)](oauth-2-0.md) — Delegated authority: limited access to an HTTP service without sharing the password.\n- [GraphQL (open-sourced 2015)](graphql.md) — Typed query language letting consumers request exactly the data they need.\n- [gRPC](grpc.md) — High-performance RPC over Protocol Buffers, suited to internal service-to-service and streaming.\n- [HTTP/2 — RFC 7540 (2015)](http-2.md) — Binary framing and multiplexing while retaining HTTP application semantics.\n- [JSON — RFC 4627 → RFC 8259 (STD 90)](json.md) — Lightweight data interchange; current standard is RFC 8259.\n- [CloudEvents 1.0 (CNCF, Oct 2019)](cloudevents.md) — Common metadata envelope for events across platforms and transports.\n- [HTTP Semantics — RFC 9110 (2022)](http-semantics.md) — Separates durable HTTP semantics from the wire formats that carry them.\n- [HTTP/3 — RFC 9114 (2022)](http-3.md) — Maps HTTP semantics onto QUIC, with independent streams.\n- [Model Context Protocol (MCP)](mcp.md) — Emerging standard connecting LLM applications to tools and data sources.\n- [OAuth 2.0 Security BCP — RFC 9700 (Jan 2025)](oauth-2-0-security-bcp.md) — Current best practice; deprecates modes now considered insecure.\n- [Agent2Agent (A2A)](a2a.md) — Emerging protocol for communication and collaboration between AI agents.\n- [OpenAPI (3.0 2017 · 3.2 Sept 2025)](openapi.md) — Vendor-neutral, machine-readable description format for HTTP APIs.\n- [AsyncAPI (3.0 2023 · 3.1 Jan 2026)](asyncapi.md) — Describes message-driven and event-oriented APIs.\n- [Arazzo 1.1 (2026)](arazzo.md) — Describes sequences of API calls and their dependencies (workflows).\n\n# Terms\nGlossary terms used here: [Binary framing](../glossary/binary-framing.md), [Content negotiation](../glossary/content-negotiation.md), [Delegated authority](../glossary/delegated-authority.md), [Event envelope](../glossary/event-envelope.md), [Event-driven](../glossary/event-driven.md), [Media type](../glossary/media-type.md), [Message-driven](../glossary/message-driven.md), [Multiplexing](../glossary/multiplexing.md), [Open standard](../glossary/open-standard.md), [Operation](../glossary/operation.md), [QUIC](../glossary/quic.md), [RPC](../glossary/rpc.md), [Semantic interoperability](../glossary/semantic-interoperability.md), [Workflow](../glossary/workflow.md)."},"standards/json.md":{"type":"Specification","title":"JSON — RFC 4627 → RFC 8259 (STD 90)","description":"Lightweight data interchange; current standard is RFC 8259.","resource":"https://www.rfc-editor.org/info/rfc8259","timestamp":"2017-12-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n`application/json` was first defined in **RFC 4627 (July 2006)**, now **obsoleted by RFC 8259 (STD 90, December 2017)** — the current JSON standard.\n\n# Evaluation\nThe draft cites only RFC 4627. A **tracked change** in the reviewed file notes RFC 8259 supersedes it. Relates to: [REST](rest.md), [OpenAPI](openapi.md)."},"standards/mcp.md":{"type":"Protocol","title":"Model Context Protocol (MCP)","description":"Emerging standard connecting LLM applications to tools and data sources.","resource":"https://modelcontextprotocol.io/specification/2025-11-25","timestamp":"2024-11-25T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**MCP** (introduced by Anthropic, **November 2024**; spec iteration **2025-11-25**) is an emerging standard for connecting LLM applications to tools and data.\n\n# In the document\nPresented — correctly — as an **emerging** protocol, *not* a settled government standard. It does not replace well-designed APIs; it makes their quality, authority model and machine-readability more consequential.\n\n# Evaluation\nAccurate and appropriately cautious. Relates to: [A2A](a2a.md), [Agent-ready not agent-trusting](../document/themes/future-directions.md), [Anthropic](../organisations/anthropic.md)."},"standards/oauth-2-0-security-bcp.md":{"type":"Specification","title":"OAuth 2.0 Security BCP — RFC 9700 (Jan 2025)","description":"Current best practice; deprecates modes now considered insecure.","resource":"https://www.rfc-editor.org/info/rfc9700","timestamp":"2025-01-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**RFC 9700 (January 2025)** consolidates deployment experience, updates the OAuth threat model, and deprecates insecure modes (e.g. the implicit grant, ROPC).\n\n# Evaluation\nAccurate; RFC number added as a tracked change. Supports the document's \"demonstrable authority\" direction. Relates to: [OAuth 2.0](oauth-2-0.md), [Move to demonstrable authority](../document/themes/future-directions.md)."},"standards/oauth-2-0.md":{"type":"Specification","title":"OAuth 2.0 — RFC 6749 (2012)","description":"Delegated authority: limited access to an HTTP service without sharing the password.","resource":"https://www.rfc-editor.org/info/rfc6749","timestamp":"2012-10-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**OAuth 2.0 (RFC 6749, October 2012)** lets a third-party application receive *limited* access to an HTTP service on behalf of a user or in its own right, without sharing credentials.\n\n# In the document\nPairs with the API-first [legislation.gov.uk](../uk-government/legislation-gov-uk-api.md) example for the \"delegated authority + API-first government\" era.\n\n# Evaluation\nAccurate; RFC number added as a tracked change. See also [OAuth 2.0 Security BCP](oauth-2-0-security-bcp.md).\n\n# Terms\nGlossary terms used here: [Delegated authority](../glossary/delegated-authority.md)."},"standards/openapi.md":{"type":"Specification","title":"OpenAPI (3.0 2017 · 3.2 Sept 2025)","description":"Vendor-neutral, machine-readable description format for HTTP APIs.","resource":"https://spec.openapis.org/oas/v3.2.0.html","timestamp":"2025-09-19T00:00:00Z","aliases":"","section":"standards","body":"# What it is\nThe **OpenAPI Initiative** formed under the Linux Foundation (**Nov 2015**); Swagger 2.0 was donated; **OpenAPI 3.0 (2017)** followed. **OpenAPI 3.2** shipped **September 2025** (streaming descriptions, broader HTTP methods, hierarchical tags).\n\n# In the document\nThe archetype of \"prose documentation → executable contracts\". UK guidance recommends specification-first development with OpenAPI.\n\n# Evaluation\nAccurate. **Citation fix:** the draft's OpenAPI-Initiative link points to the Style Guide, not the 2015 formation/donation — cite openapis.org/about. Relates to: [Arazzo](arazzo.md), [AsyncAPI](asyncapi.md), [OpenAPI Initiative](../organisations/openapi-initiative.md).\n\n# Terms\nGlossary terms used here: [Executable contract](../glossary/contract.md)."},"standards/rest.md":{"type":"Reference","title":"REST — Fielding dissertation (2000)","description":"Architectural style of constraints, not a synonym for JSON endpoints.","resource":"https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm","timestamp":"2000-06-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\nRoy Fielding's 2000 PhD dissertation (UC Irvine) defined **Representational State Transfer**: client–server, statelessness, cacheability, layering, uniform interface. **Not** \"JSON over HTTP\".\n\n# Evaluation\nAccurate and an important corrective the document makes well. Relates to: [SOAP](soap.md), [OpenAPI](openapi.md), [HTTP Semantics](http-semantics.md).\n\n# Terms\nGlossary terms used here: [Semantic interoperability](../glossary/semantic-interoperability.md), [Statelessness](../glossary/statelessness.md)."},"standards/soap.md":{"type":"Specification","title":"SOAP 1.1 (W3C Note, May 2000)","description":"Message- and operation-oriented web-service protocol.","resource":"https://www.w3.org/TR/2000/NOTE-SOAP-20000508","timestamp":"2000-05-08T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**SOAP 1.1** (W3C Note, **8 May 2000**) — structured messaging with explicit operations; part of the XML/SOAP/WSDL enterprise stack.\n\n# In the document\nContrasted with [REST](rest.md): SOAP/WSDL concentrated on *messages, operations and explicit contracts*; REST on *architectural properties*. The draft rightly rejects \"SOAP bad, REST good\".\n\n# Evaluation\nAccurate; **uncited in the draft** — add this W3C Note. Relates to: [WSDL](wsdl.md), [XML](xml.md).\n\n# Terms\nGlossary terms used here: [Executable contract](../glossary/contract.md), [Message-driven](../glossary/message-driven.md), [Operation](../glossary/operation.md)."},"standards/wsdl.md":{"type":"Specification","title":"WSDL 1.1 (W3C Note, March 2001)","description":"Operation-oriented service-definition language for web services.","resource":"https://www.w3.org/TR/2001/NOTE-wsdl-20010315","timestamp":"2001-03-15T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**WSDL 1.1** (W3C Note, **15 March 2001**) — machine-readable service definitions enabling generated clients and enterprise integration tooling.\n\n# Evaluation\nAccurate; **uncited in the draft** — add this W3C Note. Relates to: [SOAP](soap.md), [OpenAPI](openapi.md) (its modern analogue for HTTP APIs)."},"standards/xml.md":{"type":"Specification","title":"XML 1.0 (W3C, Feb 1998)","description":"Structured, extensible markup underpinning SOAP/WSDL-era web services.","resource":"https://www.w3.org/TR/1998/REC-xml-19980210","timestamp":"1998-02-10T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**XML 1.0** became a W3C Recommendation on **10 February 1998**, enabling highly structured messages.\n\n# Evaluation\nAccurate. The draft cites only XML here even though the same sentence dates [SOAP](soap.md) and [WSDL](wsdl.md) — add those sources. Relates to: [W3C](../organisations/w3c.md)."},"uk-government/api-catalogue.md":{"type":"Reference","title":"GOV.UK API Catalogue","description":"Discovery registry; inclusion does not imply public accessibility.","resource":"https://www.api.gov.uk/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nThe **GOV.UK API Catalogue** is a discovery registry. It explicitly notes that **inclusion does not mean an API is publicly accessible** — APIs keep their own licensing, authorisation and access restrictions.\n\n# In the document\nGrounds the key distinction: *Open API = discoverable, documented, available under transparent conditions — not necessarily anonymous access or open data.*\n\n# Evaluation\nAccurate and correctly cited; one of the strongest, most policy-useful points in the piece. Relates to: [Where UK government is now](../document/themes/where-uk-government-is-now.md)."},"uk-government/api-discovery-2025.md":{"type":"Government Research","title":"Cross-government API discovery (April 2025)","description":"Found API readiness and maturity varied significantly and was generally low.","resource":"https://dataingovernment.blog.gov.uk/2025/04/03/joining-up-the-dots-the-findings-of-our-recent-api-discovery/","timestamp":"2025-04-03T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nCross-government research (**3 April 2025**) found API readiness/maturity **varied significantly and was generally low**: limited documentation, inconsistent standards, legacy/manual processes, security/governance concerns, fragmented discoverability.\n\n# Evaluation\nAccurate and correctly cited — the honest counterweight to the Blueprint's ambition. Relates to: [Blueprint](blueprint-modern-digital-government.md), [API Hub alpha](api-hub-alpha.md)."},"uk-government/api-hub-alpha.md":{"type":"Government Research","title":"API Hub alpha (2025)","description":"Identified demand for a refreshed catalogue, quality/security scores and developer tooling.","resource":"https://dataingovernment.blog.gov.uk/2025/11/28/strengthening-and-extending-connectivity-what-we-learned-from-the-api-hub-alpha/","timestamp":"2025-11-28T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nThe **API Hub alpha** identified demand for: a refreshed API catalogue; API **quality and security scores**; clearer role-based guidance; practical developer tooling; and a **signed-in developer experience**.\n\n# Evaluation\nAccurate and correctly cited. Directly feeds the document's \"API catalogue → active control plane\" direction. Relates to: [API Catalogue](api-catalogue.md), [Active control plane](../document/themes/future-directions.md)."},"uk-government/atrs.md":{"type":"Government Standard","title":"Algorithmic Transparency Recording Standard (ATRS)","description":"Mandatory across central government; tied to digital spend controls.","resource":"https://www.gov.uk/government/collections/algorithmic-transparency-recording-standard-hub","timestamp":"2025-02-19T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nThe **ATRS** is the UK standard for publishing how and why the public sector uses algorithmic tools. It is **mandatory across central government and ALBs** for tools that significantly influence decisions with a public effect or interact with the public, and was **added to the digital spend controls (February 2025)**.\n\n# Why it matters here\nTurns the document's \"registry/inventory\" idea into a legal-ish gate: agentic tools that make or shape public decisions need a published ATRS record before go-live. See [legal and accountability layer](../document/themes/legal-accountability-layer.md).\n\n# Evaluation\nVerified (GOV.UK ATRS hub; Data in Government, 2025). Relates to: [API Catalogue](api-catalogue.md), [active control plane](../document/themes/future-directions.md)."},"uk-government/blueprint-modern-digital-government.md":{"type":"Government Publication","title":"Blueprint for modern digital government (Jan 2025)","description":"Proposes a Digital Backbone, open APIs by default, and a 'once only' rule.","resource":"https://www.gov.uk/government/publications/a-blueprint-for-modern-digital-government","timestamp":"2025-01-01T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nDSIT's **Blueprint** (January 2025) proposes a **Digital Backbone** (a standard set of APIs and events across the public sector), an expectation that **every new central-government service has an open API**, and a **\"once only\"** rule for reusing information already supplied.\n\n# Evaluation\nAccurate and correctly cited. Pair with the maturity reality in the [April 2025 API discovery](api-discovery-2025.md). Relates to: [DSIT](../organisations/dsit.md), [Active control plane](../document/themes/future-directions.md)."},"uk-government/dpia-uk-gdpr.md":{"type":"Reference","title":"DPIA & data protection by design (UK GDPR Arts 35, 25)","description":"High-risk processing needs a DPIA before go-live; privacy designed in.","resource":"https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/accountability-and-governance/data-protection-impact-assessments-dpias/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\n**UK GDPR Art 35** requires a **Data Protection Impact Assessment** before high-risk processing; **Art 25** requires data protection by design and by default. For agentic systems these are pre-production gates, not paperwork after launch.\n\n# Evaluation\nStable law. Maps to the mandatory pre-production gate in the [legal layer](../document/themes/legal-accountability-layer.md). Relates to: [DUAA 2025](duaa-2025-adm.md), [PSED](equality-act-psed.md)."},"uk-government/duaa-2025-adm.md":{"type":"Legislation","title":"Data (Use and Access) Act 2025 — automated decisions (Arts 22A–22D)","description":"Replaces UK GDPR Art 22; safeguards for significant solely-automated decisions.","resource":"https://www.legislation.gov.uk/ukpga/2025/18/part/5/chapter/1/crossheading/automated-decisionmaking","timestamp":"2025-06-19T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nThe **DUAA 2025** (Royal Assent **19 June 2025**) replaced UK GDPR Art 22 with **Arts 22A–22D**, in force **5 February 2026**. Art 22A defines a *significant decision* and *meaningful human involvement*; 22B restricts special-category data; **22C requires four safeguards** for a significant solely-automated decision — information, representations, human intervention/review, and the right to contest; 22D empowers the Secretary of State to set further safeguards.\n\n# Why it matters here\nThis is the binding control behind the document's [agent-safety list](../document/themes/future-directions.md) — it determines when an agent may make a consequential decision and what the citizen is owed. See [The legal and accountability layer](../document/themes/legal-accountability-layer.md).\n\n# Evaluation\nVerified (legislation.gov.uk; Royal Assent 19 June 2025; Arts 22A–22D in force 5 Feb 2026). Relates to: [DPIA](dpia-uk-gdpr.md), [ATRS](atrs.md), [MCP](../standards/mcp.md).\n\n# Terms\nGlossary terms used here: [Automated decision](../glossary/automated-decision.md), [Meaningful human involvement](../glossary/meaningful-human-involvement.md), [Redress](../glossary/redress.md)."},"uk-government/equality-act-psed.md":{"type":"Legislation","title":"Public Sector Equality Duty (Equality Act 2010, s.149)","description":"Due regard to eliminating discrimination and advancing equality.","resource":"https://www.legislation.gov.uk/ukpga/2010/15/section/149","timestamp":"2010-04-08T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\n**Equality Act 2010, s.149** — the **Public Sector Equality Duty**: public bodies must have due regard to eliminating discrimination and advancing equality of opportunity. For agentic systems this means an **equality impact assessment** and **bias testing** across protected groups.\n\n# Evaluation\nStable law. Maps to the evaluation and pre-production gate in the [legal layer](../document/themes/legal-accountability-layer.md). Relates to: [DPIA](dpia-uk-gdpr.md)."},"uk-government/gds-api-standards.md":{"type":"Government Standard","title":"GDS API technical and data standards (Feb 2018)","description":"Cross-government API guidance: REST default, OpenAPI specification-first.","resource":"https://www.gov.uk/guidance/gds-api-technical-and-data-standards","timestamp":"2018-02-01T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nFirst published **February 2018**. Promotes REST for many cases (recognising GraphQL/gRPC where better suited) and recommends **specification-first development using [OpenAPI](../standards/openapi.md)**.\n\n# Evaluation\nAccurate and correctly cited. Relates to: [Open Standards Board](open-standards-board-openapi3.md), [GDS](../organisations/gds.md)."},"uk-government/index.md":{"type":"Index","title":"UK government sources","description":"UK policy, standards, research and registries referenced in the document.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"uk-government","body":"# UK government sources\n\nUK policy, standards, research and registries referenced in the document.\n\n- [Public Sector Equality Duty (Equality Act 2010, s.149)](equality-act-psed.md) — Due regard to eliminating discrimination and advancing equality.\n- [legislation.gov.uk — API-first (2012)](legislation-gov-uk-api.md) — The UK's landmark API-first service; the API was the 'beating heart'.\n- [GDS API technical and data standards (Feb 2018)](gds-api-standards.md) — Cross-government API guidance: REST default, OpenAPI specification-first.\n- [Open Standards Board — OpenAPI 3 (2019)](open-standards-board-openapi3.md) — Formally recommended OpenAPI 3 for describing RESTful APIs.\n- [Blueprint for modern digital government (Jan 2025)](blueprint-modern-digital-government.md) — Proposes a Digital Backbone, open APIs by default, and a 'once only' rule.\n- [Algorithmic Transparency Recording Standard (ATRS)](atrs.md) — Mandatory across central government; tied to digital spend controls.\n- [Cross-government API discovery (April 2025)](api-discovery-2025.md) — Found API readiness and maturity varied significantly and was generally low.\n- [Data (Use and Access) Act 2025 — automated decisions (Arts 22A–22D)](duaa-2025-adm.md) — Replaces UK GDPR Art 22; safeguards for significant solely-automated decisions.\n- [API Hub alpha (2025)](api-hub-alpha.md) — Identified demand for a refreshed catalogue, quality/security scores and developer tooling.\n- [GOV.UK API Catalogue](api-catalogue.md) — Discovery registry; inclusion does not imply public accessibility.\n- [DPIA & data protection by design (UK GDPR Arts 35, 25)](dpia-uk-gdpr.md) — High-risk processing needs a DPIA before go-live; privacy designed in.\n\n# Terms\nGlossary terms used here: [Automated decision](../glossary/automated-decision.md)."},"uk-government/legislation-gov-uk-api.md":{"type":"Government Publication","title":"legislation.gov.uk — API-first (2012)","description":"The UK's landmark API-first service; the API was the 'beating heart'.","resource":"https://gds.blog.gov.uk/2012/03/30/putting-apis-first-legislation-gov-uk/","timestamp":"2012-03-30T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nIn **2012**, GDS built the **legislation.gov.uk API first** and the public website on top of it — described as the **\"beating heart\"** of the service.\n\n# In the document\nDefines *API-first properly*: not \"API before understanding the service\", but treating the **service boundary as a first-class product and contract**.\n\n# Evaluation\nAccurate and correctly cited (GDS blog, 30 March 2012). Relates to: [GDS](../organisations/gds.md), [OAuth 2.0](../standards/oauth-2-0.md)."},"uk-government/open-standards-board-openapi3.md":{"type":"Government Standard","title":"Open Standards Board — OpenAPI 3 (2019)","description":"Formally recommended OpenAPI 3 for describing RESTful APIs.","resource":"https://technology.blog.gov.uk/2019/10/02/improve-csvs-and-api-descriptions-with-these-open-standards-board-recommendations/","timestamp":"2019-10-02T00:00:00Z","aliases":"","section":"uk-government","body":"# What it is\nIn **2019**, the UK **Open Standards Board** formally recommended **OpenAPI 3** (and RFC 4180 for CSVs) to improve data sharing across government.\n\n# Evaluation\nAccurate and correctly cited. Relates to: [OpenAPI](../standards/openapi.md), [GDS API standards](gds-api-standards.md)."}},"edges":[["document/index.md","document/overview.md"],["document/index.md","document/peer-review.md"],["document/index.md","document/themes/index.md"],["document/index.md","document/timeline/index.md"],["document/overview.md","document/peer-review.md"],["document/overview.md","document/themes/index.md"],["document/overview.md","document/timeline/index.md"],["document/overview.md","glossary/provenance.md"],["document/overview.md","sources-index.md"],["document/peer-review.md","document/themes/legal-accountability-layer.md"],["document/peer-review.md","glossary/redress.md"],["document/peer-review.md","glossary/schema.md"],["document/peer-review.md","glossary/semantic-interoperability.md"],["document/peer-review.md","standards/arazzo.md"],["document/peer-review.md","standards/grpc.md"],["document/peer-review.md","standards/json.md"],["document/peer-review.md","standards/openapi.md"],["document/peer-review.md","standards/soap.md"],["document/peer-review.md","standards/wsdl.md"],["document/themes/future-directions.md","document/themes/legal-accountability-layer.md"],["document/themes/future-directions.md","glossary/bearer-token.md"],["document/themes/future-directions.md","glossary/contract.md"],["document/themes/future-directions.md","glossary/human-in-the-loop.md"],["document/themes/future-directions.md","glossary/idempotency.md"],["document/themes/future-directions.md","glossary/provenance.md"],["document/themes/future-directions.md","glossary/redress.md"],["document/themes/future-directions.md","glossary/schema.md"],["document/themes/future-directions.md","glossary/workflow.md"],["document/themes/future-directions.md","glossary/workload-identity.md"],["document/th function edgeCol(s,t,center){if(relHi){return relType(s,t)===relHi?'rgba(120,210,255,.95)':'rgba(120,132,170,.05)';}return center?'rgba(174,196,255,.5)':'rgba(120,132,170,.18)';}
function render(){ctx.setTransform(DPR,0,0,DPR,0,0);ctx.clearRect(0,0,Wc,Hc);axis();
 if(sel){const cid=sel.id;ctx.lineWidth=1.2;
  G.edges.forEach(([s,t])=>{if(!focusSet.has(s)||!focusSet.has(t))return;const a=M[s],b=M[t],center=(s===cid||t===cid);ctx.strokeStyle=edgeCol(s,t,center);ctx.beginPath();ctx.moveTo(sx(a),sy(a));ctx.lineTo(sx(b),sy(b));ctx.stroke();});
  focusSet.forEach(s=>focusSet.forEach(t=>{if(s!==t&&DSET.has(s+'>'+t)&&(s===cid||t===cid)){if(relHi&&relType(s,t)!==relHi)return;arrow(M[s],M[t],'rgba(190,206,255,.85)');}}));
  if(hoverEdge){const[s,t]=hoverEdge;ctx.strokeStyle='rgba(120,210,255,1)';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(sx(M[s]),sy(M[s]));ctx.lineTo(sx(M[t]),sy(M[t]));ctx.stroke();}
  focusSet.forEach(id=>{const n=M[id],r=nodeR(n);ctx.fillStyle=COL[n.section]||'#888';ctx.beginPath();ctx.arc(sx(n),sy(n),r,0,7);ctx.fill();if(n===sel){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();}else if(n===hover){ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1.5;ctx.stroke();}});
 }else{const hl=hover;const nb=hl?adj[hl.id]:null;ctx.lineWidth=1;
  G.edges.forEach(([s,t])=>{const a=M[s],b=M[t];if(!a||!b)return;const on=hl&&(s===hl.id||t===hl.id);ctx.strokeStyle=on?'rgba(174,196,255,.7)':'rgba(120,132,170,.08)';ctx.beginPath();ctx.moveTo(sx(a),sy(a));ctx.lineTo(sx(b),sy(b));ctx.stroke();});
  if(hl){OUT[hl.id].forEach(t=>arrow(hl,M[t],'rgba(190,206,255,.85)'));INC[hl.id].forEach(s=>arrow(M[s],hl,'rgba(190,206,255,.5)'));}
  if(hoverEdge){const[s,t]=hoverEdge;ctx.strokeStyle='rgba(120,210,255,1)';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(sx(M[s]),sy(M[s]));ctx.lineTo(sx(M[t]),sy(M[t]));ctx.stroke();arrow(M[s],M[t],'rgba(140,220,255,1)');}
  N.forEach(n=>{const r=nodeR(n);const dim=hl&&n!==hl&&!(nb&&nb.has(n.id));ctx.globalAlpha=dim?0.26:1;ctx.fillStyle=COL[n.section]||'#888';ctx.beginPath();ctx.arc(sx(n),sy(n),r,0,7);ctx.fill();ctx.globalAlpha=1;});}
 drawLabels();}
function stepAnim(){if(animating){let moving=false;N.forEach(n=>{if(n===drag)return;const dx=n.tx-n.x,dy=n.ty-n.y;if(Math.abs(dx)+Math.abs(dy)>0.5){n.x+=dx*0.22;n.y+=dy*0.22;moving=true;}else{n.x=n.tx;n.y=n.ty;}});dirty=true;if(!moving)animating=false;}
 if(!animating&&numLayers>1){const now=Date.now();if(now-labelSwitchAt>=DWELL[dwi]){labelLayer=(labelLayer+1)%numLayers;labelSwitchAt=now;labelFadeAt=now;dirty=true;}else if(now-labelFadeAt<FADE){dirty=true;}}
 if(dirty){render();dirty=false;}requestAnimationFrame(stepAnim);}stepAnim();
function world(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left-view.x)/view.k,y:(e.clientY-r.top-view.y)/view.k};}
function pick(e){const w=world(e);let best=null,bd=22/view.k;const pool=sel?[...focusSet].map(id=>M[id]):N;pool.forEach(n=>{const d=Math.hypot(n.x-w.x,n.y-w.y);if(d<bd){bd=d;best=n;}});return best;}
function segDist(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;let tt=l2?((px-x1)*dx+(py-y1)*dy)/l2:0;tt=Math.max(0,Math.min(1,tt));const cx=x1+tt*dx,cy=y1+tt*dy;return Math.hypot(px-cx,py-cy);}
function edgePick(e){const w=world(e);let best=null,bd=8/view.k;const eds=sel?G.edges.filter(([s,t])=>focusSet.has(s)&&focusSet.has(t)):G.edges;for(const ed of eds){const a=M[ed[0]],b=M[ed[1]];if(!a||!b)continue;const d=segDist(w.x,w.y,a.x,a.y,b.x,b.y);if(d<bd){bd=d;best=ed;}}return best;}
function showNodeTip(n,e){const r=wrap.getBoundingClientRect();tip.innerHTML='<b>'+esc(n.title)+'</b><div class="ty">'+esc(n.type)+'</div><div class="m" style="margin-top:3px">'+esc(n.description||'')+'</div><div class="m" style="margin-top:5px">'+OUT[n.id].size+' references · '+INC[n.id].size+' referenced by</div>';tip.style.display='block';let x=e.clientX-r.left+14,y=e.clientY-r.top+14;if(x+280>Wc)x=e.clientX-r.left-280;if(y+96>Hc)y=e.clientY-r.top-96;tip.style.left=x+'px';tip.style.top=y+'px';}
function showEdgeTip(ed,e){const r=wrap.getBoundingClientRect();const a=M[ed[0]],b=M[ed[1]];tip.innerHTML='<div class="ar">'+esc(a.title)+' &nbsp;—['+esc(relType(ed[0],ed[1]))+']→&nbsp; '+esc(b.title)+'</div><div class="m" style="margin-top:4px">relationship inferred from link direction</div>';tip.style.display='block';let x=e.clientX-r.left+14,y=e.clientY-r.top+14;if(x+300>Wc)x=e.clientX-r.left-300;tip.style.left=x+'px';tip.style.top=y+'px';}
cv.addEventListener('mousemove',e=>{if(drag){if(drag.pan){view.x=e.clientX-drag.psx;view.y=e.clientY-drag.psy;drag.moved=true;dirty=true;}else{const w=world(e);drag.x=w.x;drag.y=w.y;drag.tx=w.x;drag.ty=w.y;drag.moved=true;dirty=true;}tip.style.display='none';return;}
 const h=pick(e);if(h){if(h!==hover){hover=h;hoverEdge=null;dirty=true;}showNodeTip(h,e);cv.style.cursor='pointer';return;}
 if(hover){hover=null;dirty=true;}const ed=edgePick(e);if((ed&&!hoverEdge)||(ed&&hoverEdge&&(ed[0]!==hoverEdge[0]||ed[1]!==hoverEdge[1]))){hoverEdge=ed;dirty=true;}else if(!ed&&hoverEdge){hoverEdge=null;dirty=true;}
 if(ed){showEdgeTip(ed,e);cv.style.cursor='pointer';}else{tip.style.display='none';cv.style.cursor='grab';}});
cv.addEventListener('mouseleave',()=>{tip.style.display='none';if(hover||hoverEdge){hover=null;hoverEdge=null;dirty=true;}});
cv.addEventListener('mousedown',e=>{const n=pick(e);if(n){drag=n;n.vx=n.vy=0;drag.moved=false;}else{drag={pan:true,psx:e.clientX-view.x,psy:e.clientY-view.y,moved:false};}});
window.addEventListener('mouseup',e=>{if(drag){if(drag.pan){if(!drag.moved){const ed=edgePick(e);if(ed){focusUser(ed[1]);}else overviewUser();}}else if(!drag.moved){focusUser(drag.id);}}drag=null;});
function zoomAt(cx,cy,f){const wx=(cx-view.x)/view.k,wy=(cy-view.y)/view.k;view.k=Math.max(0.2,Math.min(2.6,view.k*f));view.x=cx-wx*view.k;view.y=cy-wy*view.k;dirty=true;}
cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
document.getElementById('zin').onclick=()=>zoomAt(Wc/2,Hc/2,1.2);
document.getElementById('zout').onclick=()=>zoomAt(Wc/2,Hc/2,1/1.2);
document.getElementById('zfit').onclick=()=>{if(sel)(layout==='force'?focusViewRadial():fitFocusSubset());else fitBase();};
document.getElementById('menu').onclick=()=>{side.classList.toggle('open');if(sel)(layout==='force'?focusViewRadial():fitFocusSubset());else fitBase();};
document.getElementById('dclose').onclick=()=>overviewUser();
document.getElementById('bback').onclick=back;document.getElementById('bfwd').onclick=forward;
document.getElementById('bhome').onclick=()=>setLayoutUser('force');
const dwb=document.getElementById('dwell');function updDwell(){dwb.textContent='⏱ '+(DWELL[dwi]/1000).toFixed(1)+'s';}dwb.onclick=()=>{dwi=(dwi+1)%DWELL.length;updDwell();};updDwell();
[...document.querySelectorAll('.bar [data-l]')].forEach(b=>b.onclick=()=>setLayoutUser(b.dataset.l));
window.addEventListener('keydown',e=>{if(e.target&&e.target.tagName==='INPUT')return;if(e.altKey&&e.key==='ArrowLeft'){back();e.preventDefault();}else if(e.altKey&&e.key==='ArrowRight'){forward();e.preventDefault();}else if(e.key==='Escape'){overviewUser();}});
if(window.innerWidth>=920)side.classList.add('open');
const listEl=document.getElementById('list');
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function setActive(id){[...listEl.children].forEach(c=>{if(c.dataset)c.classList.toggle('active',c.dataset.id===id);});}
const order=['root','document','standards','uk-government','organisations','glossary'];
function buildList(filter){listEl.innerHTML='';order.forEach(sec=>{const items=N.filter(n=>n.section===sec&&(!filter||(n.title+n.description).toLowerCase().includes(filter)));if(!items.length)return;const h=document.createElement('div');h.className='grp';h.textContent=sec;listEl.appendChild(h);items.sort((a,b)=>a.title.localeCompare(b.title)).forEach(n=>{const d=document.createElement('div');d.className='item'+(sel&&sel.id===n.id?' active':'');d.innerHTML='<i class="dot" style="margin-top:5px;background:'+(COL[sec]||'#888')+'"></i><span class="t">'+esc(n.title)+'</span>';d.onclick=()=>{focusUser(n.id);if(window.innerWidth<920)side.classList.remove('open');};d.dataset.id=n.id;listEl.appendChild(d);});});}
document.getElementById('q').addEventListener('input',e=>buildList(e.target.value.toLowerCase()));
function norm(base,href){const dir=base.split('/').slice(0,-1);href.split('/').forEach(p=>{if(p==='..')dir.pop();else if(p!=='.')dir.push(p);});return dir.join('/');}
function md(text,base){const lines=text.split('\n');let html='',i=0;
 function inline(s){s=esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,t,u)=>{if(/^https?:|^mailto:/.test(u))return '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>';const tg=norm(base,u.split('#')[0]);if(G.nodes[tg])return '<a href="#" data-nav="'+tg+'">'+t+'</a>';return t;});return s;}
 while(i<lines.length){let l=lines[i];
  if(/^#\s/.test(l)){html+='<h1 class="b">'+inline(l.slice(2))+'</h1>';i++;continue;}
  if(/^##\s/.test(l)){html+='<h2 class="b">'+inline(l.slice(3))+'</h2>';i++;continue;}
  if(/^\s*[-*]\s/.test(l)){html+='<ul>';while(i<lines.length&&/^\s*[-*]\s/.test(lines[i])){html+='<li>'+inline(lines[i].replace(/^\s*[-*]\s/,''))+'</li>';i++;}html+='</ul>';continue;}
  if(/^\s*\d+\.\s/.test(l)){html+='<ol>';while(i<lines.length&&/^\s*\d+\.\s/.test(lines[i])){html+='<li>'+inline(lines[i].replace(/^\s*\d+\.\s/,''))+'</li>';i++;}html+='</ol>';continue;}
  if(l.trim()===''){i++;continue;}
  html+='<p>'+inline(l)+'</p>';i++;}
 return html;}
function linkifyGloss(root){if(!root||!GLOSS_RE||typeof document.createTreeWalker!=='function')return;try{const used=new Set();const tw=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);const nodes=[];let c;while(c=tw.nextNode())nodes.push(c);nodes.forEach(tn=>{const pn=tn.parentNode;if(!pn)return;const nm=pn.nodeName;if(nm==='A'||nm==='CODE')return;const text=tn.nodeValue;if(!text||text.length<3)return;GLOSS_RE.lastIndex=0;if(!GLOSS_RE.test(text))return;GLOSS_RE.lastIndex=0;let mt,frag=document.createDocumentFragment(),idx=0,changed=false;while((mt=GLOSS_RE.exec(text))){const term=mt[0],gid=GLOSS[term.toLowerCase()];if(!gid||used.has(gid))continue;used.add(gid);changed=true;if(mt.index>idx)frag.appendChild(document.createTextNode(text.slice(idx,mt.index)));const a=document.createElement('a');a.href='#';a.className='gl';a.setAttribute('data-nav',gid);a.textContent=term;frag.appendChild(a);idx=mt.index+term.length;}if(changed){if(idx<text.length)frag.appendChild(document.createTextNode(text.slice(idx)));pn.replaceChild(frag,tn);}});}catch(e){}}
function relList(ids){return ids.sort((a,b)=>(SECI[M[a].section]-SECI[M[b].section])||G.nodes[a].title.localeCompare(G.nodes[b].title)).map(t=>'<li><span class="dot" style="background:'+(COL[M[t].section]||'#888')+'"></span> <a href="#" data-nav="'+t+'">'+esc(G.nodes[t].title)+'</a></li>').join('');}
function openDetail(id){const n=G.nodes[id];if(!n)return;let h='<span class="badge">'+esc(n.type)+'</span><h2 class="tt">'+esc(n.title)+'</h2><div class="desc">'+esc(n.description)+'</div>';
 if(n.resource)h+='<div class="res">🔗 <a href="'+n.resource+'" target="_blank" rel="noopener">'+esc(n.resource)+'</a></div>';
 h+=md(n.body,id);
 const out=[...OUT[id]],inc=[...INC[id]];
 const types={};out.forEach(t=>{const r=relType(id,t);(types[r]=types[r]||0,types[r]++);});inc.forEach(s=>{const r=relType(s,id);(types[r]=types[r]||0,types[r]++);});
 const tkeys=Object.keys(types);if(tkeys.length)h+='<h2 class="b">Relationship types (inferred)</h2><div class="chips">'+tkeys.map(r=>'<span class="chip" data-rel="'+esc(r)+'">'+esc(r)+' ('+types[r]+')</span>').join('')+'</div>';
 if(out.length)h+='<h2 class="b">References → ('+out.length+')</h2><ul class="rel">'+relList(out)+'</ul>';
 if(inc.length)h+='<h2 class="b">← Referenced by ('+inc.length+')</h2><ul class="rel">'+relList(inc)+'</ul>';
 const db=document.getElementById('dbody');db.innerHTML=h;detail.scrollTop=0;detail.classList.add('open');
 linkifyGloss(db);
 db.querySelectorAll('[data-nav]').forEach(x=>x.onclick=e=>{e.preventDefault();focusUser(x.getAttribute('data-nav'));});
 db.querySelectorAll('.chip').forEach(c=>{c.onmouseenter=()=>{relHi=c.getAttribute('data-rel');dirty=true;};c.onmouseleave=()=>{relHi=null;dirty=true;};});}
buildList('');document.getElementById('count').textContent=paths.length+' concepts · '+G.edges.length+' links';
HIST=[{layout:'force',id:null}];HI=0;updateNav();
</script></body></html>
