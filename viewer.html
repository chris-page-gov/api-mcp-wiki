<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>api-mcp-wiki — OKF viewer</title><style>
:root{--bg:#0f1320;--panel:#171c2e;--panel2:#1e2438;--line:#2b3350;--tx:#e7ebf5;--mut:#9aa6c4;--acc:#6ea8fe;}
*{box-sizing:border-box}html,body{margin:0;height:100%}

.tgl{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:7px;height:30px;min-width:34px;padding:0 8px;font-size:14px;cursor:pointer}

.legend span{font-size:11px;color:var(--mut);display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.wrap{flex:1;position:relative;min-height:0;overflow:hidden}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:9;background:rgba(15,19,32,.8);padding:4px;border-radius:9px;border:1px solid var(--line);max-width:94%;flex-wrap:wrap;align-items:center}
.bar button{background:transparent;color:var(--mut);border:0;border-radius:6px;height:28px;padding:0 11px;font-size:12.5px;cursor:pointer}

#side{position:absolute;top:0;left:0;bottom:0;width:272px;max-width:82%;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;transform:translateX(-101%);transition:transform .2s ease;z-index:20;box-shadow:2px 0 16px rgba(0,0,0,.3)}

#detail{position:absolute;top:0;right:0;bottom:0;width:392px;max-width:92%;background:var(--panel);border-left:1px solid var(--line);overflow:auto;padding:16px 18px 28px;transform:translateX(101%);transition:transform .2s ease;z-index:24;box-shadow:-2px 0 16px rgba(0,0,0,.3)}

.badge{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);margin-bottom:8px}

#detail h1.b{font-size:16px;margin:1em 0 .3em}#detail h2.b{font-size:13.5px;margin:1.1em 0 .3em;color:var(--acc)}

#detail ul,#detail ol{padding-left:18px;margin:.3em 0}#detail li{margin:.2em 0}

.count{position:absolute;right:12px;bottom:10px;font-size:11px;color:var(--mut);background:rgba(15,19,32,.74);padding:4px 8px;border-radius:6px;z-index:8}

#tip b{font-size:12.5px}#tip .m{color:var(--mut)}#tip .ty{color:var(--acc);font-size:11px}#tip .ar{color:#bfe0ff}
</style></head><body><header><button class="tgl" id="menu" title="Show/hide list">☰</button><h1>api-mcp-wiki</h1><span class="sub">OKF viewer · From GET to agentic government</span><div class="legend"><span><i class="dot" style="background:#ef8a3a"></i>document</span><span><i class="dot" style="background:#4c8bf5"></i>standards</span><span><i class="dot" style="background:#a142f4"></i>uk-gov</span><span><i class="dot" style="background:#34a853"></i>orgs</span><span><i class="dot" style="background:#14b8a6"></i>glossary</span><span><i class="dot" style="background:#8a93ad"></i>root</span></div></header><div class="wrap" id="wrap"><canvas id="cv"></canvas><div class="bar"><button id="bback" title="Back (Alt+Left)">←</button><button id="bfwd" title="Forward (Alt+Right)">→</button><span class="sep"></span><button id="bhome" title="Reset to the full map">⌂ Home</button><span class="sep"></span><button data-l="force" class="on">Force</button><button data-l="timeline">Timeline</button><button data-l="type">Type</button><button data-l="narrative">Narrative</button><span class="sep"></span><button id="dwell" title="Label rotation speed">⏱ 1.0s</button></div><div class="ctl"><button id="zin" title="Zoom in">+</button><button id="zout" title="Zoom out">&minus;</button><button id="zfit" title="Fit">⤢</button></div><div class="hint" id="hint">Click a node to focus on what connects to it · click empty space for the full map</div><div class="count" id="count"></div><div id="tip"></div><aside id="side"><input id="q" placeholder="Search concepts…"><div id="list"></div></aside><aside id="detail"><button id="dclose" title="Close">✕</button><div id="dbody"></div></aside></div><script>
const G={"nodes":{"document/index.md":{"type":"Index","title":"The reviewed document","description":"From GET to agentic government — content, themes and the peer-review evaluation.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"# The reviewed document\n\nFrom GET to agentic government — content, themes and the peer-review evaluation.\n\n- **[Themes/](themes/index.md)**\n- **[Timeline/](timeline/index.md)**\n- [From GET to agentic government — overview](overview.md) — Reviewed primer tracing HTTP/API evolution toward agentic government (UK focus).\n- [Peer review & evaluation](peer-review.md) — Summary of the independent review: verdict, verified claims, issues, strengths."},"document/overview.md":{"type":"Document","title":"From GET to agentic government — overview","description":"Reviewed primer tracing HTTP/API evolution toward agentic government (UK focus).","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"# What it is\nA ~2,140-word primer: a **timeline** of HTTP/API evolution, **six architectural shifts**, **where UK government is now**, and **six future directions**. Header provenance: *GPT-5.5-Pro (author) · Opus 4.8 (review) · Approval/Authorisation: none.*\n\n# Verdict\n**Accept with minor revisions.** Every dated/version claim was verified against primary sources and holds up; the revisions are about **citation hygiene** and **one substantive gap** (the legal/accountability layer). See [Peer review](peer-review.md).\n\n# Navigate\n[Timeline](timeline/index.md) · [Themes](themes/index.md) · [Peer review](peer-review.md) · [Sources index](../sources-index.md)\n\n# Terms\nGlossary terms used here: [Provenance](../glossary/provenance.md)."},"document/peer-review.md":{"type":"Evaluation","title":"Peer review & evaluation","description":"Summary of the independent review: verdict, verified claims, issues, strengths.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"# Verdict\n**Accept with minor revisions.** Accurate, well-structured, decision-oriented.\n\n# Verified\nAll 21 dated/version claim-groups checked against primary sources — **all correct** — including the hard recent ones: OpenAPI 3.2 (Sep 2025), AsyncAPI 3.1 (Jan 2026), OAuth BCP RFC 9700 (Jan 2025), A2A → Linux Foundation (Jun 2025), the Jan 2025 Blueprint, the Apr 2025 API discovery. Only Arazzo's exact month is unconfirmed (schema iteration dated 2026-04-15).\n\n# Issues\n- **S1 (now drafted):** a [legal and accountability layer](themes/legal-accountability-layer.md) has been added (tracked insertion in the .docx). Original gap: no legal/accountability layer (DUAA 2025 Arts 22A–D; ATRS; public-law duty to give reasons; Equality Act 2010 s.149 PSED; redress). For government the binding control is **law, not protocol**.\n- **Sourcing (C1–C6):** HTTP/0.9 mis-cited to RFC 2068; [SOAP](../standards/soap.md)/[WSDL](../standards/wsdl.md)/[gRPC](../standards/grpc.md)/[Arazzo](../standards/arazzo.md) uncited; [OpenAPI](../standards/openapi.md) link is the Style Guide; [JSON](../standards/json.md) cites RFC 4627 (now RFC 8259); many links carry `?utm_source=chatgpt.com`; no access dates.\n- **Presentation (P1–P3):** stray \"/\" in title; add a handling note; optional summary box.\n\n# Strengths\nAccuracy; the semantics-vs-wire spine; \"open = discoverable, not open data\"; the cautious MCP/A2A treatment; honest maturity framing.\n\n# Deliverables\nTracked .docx (`From GET to Agentic Government__PEER-REVIEW-tracked.docx`) with 4 tracked insertions, 8 comments, and a 34-entry References section; full review in `PEER-REVIEW_From-GET-to-Agentic-Government.md`.\n\n# Terms\nGlossary terms used here: [Redress](../glossary/redress.md), [Schema](../glossary/schema.md), [Semantic interoperability](../glossary/semantic-interoperability.md)."},"document/themes/future-directions.md":{"type":"Concept","title":"Future direction possibilities (six)","description":"Six strategic directions, with confidence labels and 'Action now' calls.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"1. **API catalogue → active control plane** *(high confidence)* — continuously expose ownership, descriptions, classification, conformance, SLOs, versions, consumers, lineage. *Action now: require discoverable ownership and machine-readable contracts as a condition of production deployment.*\n2. **Treat API + event + workflow descriptions as one family** *(high confidence)* — [OpenAPI](../../standards/openapi.md) + [AsyncAPI](../../standards/asyncapi.md) + [Arazzo](../../standards/arazzo.md) + shared schemas. *Action now: design around business events and user outcomes before choosing the protocol.*\n3. **Agent-ready, but not agent-trusting** *(emerging)* — non-human identities, scoped/time-limited authority, read/recommend/act separation, human approval, audit, idempotency, limits, rollback, provenance, redress. *Principle: understanding an API is never authority to use it.* **Now addressed:** see [The legal and accountability layer](legal-accountability-layer.md) (added in review) — DUAA 2025 Arts 22A–22D, ATRS, the duty to give reasons, PSED, and redress.\n4. **Semantic > syntactic interoperability** *(hard)* — persistent IDs, shared vocabularies, definitions/provenance, model mappings, effective dates; a *federated* model beats one universal data model.\n5. **Bearer access → demonstrable authority** *(high confidence security)* — workload identity, proof-bound credentials, fine-grained policy, short-lived access, continuous audit. *\"Who is acting, for whom, for what purpose, under which legal authority, with what evidence retained?\"* See [OAuth BCP](../../standards/oauth-2-0-security-bcp.md).\n6. **APIs as enduring public products** *(operating model)* — funded ownership, user research, support, reliability targets, lifecycle policy, backward-compatibility, sustainable funding.\n\n**Evaluation:** strong and decision-oriented. Only direction 3 needs the legal layer added.\n\n# Terms\nGlossary terms used here: [Bearer token](../../glossary/bearer-token.md), [Executable contract](../../glossary/contract.md), [Human-in-the-loop](../../glossary/human-in-the-loop.md), [Idempotency](../../glossary/idempotency.md), [Provenance](../../glossary/provenance.md), [Redress](../../glossary/redress.md), [Schema](../../glossary/schema.md), [Workflow](../../glossary/workflow.md), [Workload identity](../../glossary/workload-identity.md)."},"document/themes/index.md":{"type":"Index","title":"Themes","description":"The six shifts, the UK position, and the six future directions.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"# Themes\n\nThe six shifts, the UK position, and the six future directions.\n\n- [The historical movement in six shifts](six-shifts.md) — Six architectural shifts condensing the timeline.\n- [Where UK government is now](where-uk-government-is-now.md) — Policy ambition vs current maturity; the meaning of 'open API'.\n- [Future direction possibilities (six)](future-directions.md) — Six strategic directions, with confidence labels and 'Action now' calls.\n- [The legal and accountability layer (law, not protocol)](legal-accountability-layer.md) — Maps the agent-safety controls to the UK legal duties that bind regardless of protocol."},"document/themes/legal-accountability-layer.md":{"type":"Concept","title":"The legal and accountability layer (law, not protocol)","description":"Maps the agent-safety controls to the UK legal duties that bind regardless of protocol.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"# Why it exists\nAdded in peer review to close the document's main substantive gap. The agent-safety controls answer *can the agent act, and can we prove what it did?* They do not answer what a public body is **legally** accountable for: *may government lawfully take this decision, in this way, and can the person affected understand and challenge it?* Those duties bind regardless of MCP/A2A and largely cannot be delegated to a system — **for government the binding control is often law, not protocol.**\n\n# What the law requires → where it lands\n- **Automated decisions** — [DUAA 2025, Arts 22A–22D](../../uk-government/duaa-2025-adm.md) (in force 5 Feb 2026): for a significant solely-automated decision, give information, allow representations, enable human intervention/review, allow contest. → approval design; human-in-the-loop; a meaningful-human-involvement test.\n- **DPIA / by design** — [UK GDPR Arts 35 & 25](../../uk-government/dpia-uk-gdpr.md). → mandatory pre-production gate.\n- **Transparency** — [ATRS](../../uk-government/atrs.md), mandatory + spend-control gate. → registry/inventory.\n- **Public-law duties** — lawfulness, rationality, procedural fairness, duty to give reasons; a **named human** stays the legal decision-maker. → identity records authority; evidence captures reasons.\n- **Equality** — [PSED, Equality Act 2010 s.149](../../uk-government/equality-act-psed.md). → evaluation; bias testing.\n- **Redress** — explanation, human review, appeal; judicial review. → incident response; governance.\n\n# Action now\nPair the agentic profile with this legal-control layer, and mark on every tool where the binding control is law, not protocol.\n\nRelates to: [Future directions](future-directions.md), [Agent-ready (MCP)](../../standards/mcp.md), [A2A](../../standards/a2a.md), [Peer review](../peer-review.md).\n\n# Terms\nGlossary terms used here: [Automated decision](../../glossary/automated-decision.md), [Human-in-the-loop](../../glossary/human-in-the-loop.md), [Redress](../../glossary/redress.md)."},"document/themes/six-shifts.md":{"type":"Concept","title":"The historical movement in six shifts","description":"Six architectural shifts condensing the timeline.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"1. **Documents → resources & capabilities** — HTTP moved from pages to general distributed systems.\n2. **Private integration → open ecosystems** — APIs as boundaries partners build on independently.\n3. **Prose docs → executable contracts** — [OpenAPI](../../standards/openapi.md) etc. enable validation, generation, testing.\n4. **Synchronous requests → events & streams** — [AsyncAPI](../../standards/asyncapi.md), [CloudEvents](../../standards/cloudevents.md).\n5. **Individual operations → whole outcomes** — [Arazzo](../../standards/arazzo.md) workflows.\n6. **Human developers → machine consumers** — automation/AI raise the stakes on machine-readable constraints, authority, provenance, auditability.\n\n**Evaluation:** the strongest organising idea in the piece; keep verbatim.\n\n# Terms\nGlossary terms used here: [Executable contract](../../glossary/contract.md), [Operation](../../glossary/operation.md), [Provenance](../../glossary/provenance.md), [Request–response](../../glossary/request-response.md), [Workflow](../../glossary/workflow.md)."},"document/themes/where-uk-government-is-now.md":{"type":"Concept","title":"Where UK government is now","description":"Policy ambition vs current maturity; the meaning of 'open API'.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"**Ambition:** the [Blueprint](../../uk-government/blueprint-modern-digital-government.md) (2025) — Digital Backbone, open API by default, \"once only\".\n\n**Reality:** the [April 2025 discovery](../../uk-government/api-discovery-2025.md) found maturity *generally low*; the [API Hub alpha](../../uk-government/api-hub-alpha.md) showed demand for a catalogue, quality/security scores, role-based guidance, tooling and a signed-in experience.\n\n**Key distinction:** *Open API = discoverable, documented, available under transparent conditions — not necessarily anonymous access or open data* (grounded in the [API Catalogue](../../uk-government/api-catalogue.md) caveat).\n\n**Evaluation:** accurate and well-balanced; the policy-vs-maturity framing is exactly right."},"document/timeline/1989-1993-web-and-earliest-http.md":{"type":"Timeline Event","title":"1989–1993 — The Web and the earliest HTTP","description":"CERN, the first browser/server, and HTTP/0.9; royalty-free release in 1993.","resource":"","timestamp":"1993-04-30T00:00:00Z","aliases":"","section":"document","body":"**1989** Berners-Lee proposes the Web at CERN; **1990** first browser/server on NeXT; **30 April 1993** CERN releases the Web **royalty-free**. [HTTP/0.9](../../standards/http-0-9.md) is minimal — no status codes, types or metadata.\n\n**Significance:** openness and implementability mattered more than sophistication.\n\n**Evaluation:** accurate; fix the HTTP/0.9 citation (currently RFC 2068). See [CERN](../../organisations/cern.md).\n\n# Terms\nGlossary terms used here: [Open standard](../../glossary/open-standard.md)."},"document/timeline/1996-http-1-0.md":{"type":"Timeline Event","title":"1996 — HTTP/1.0 formally documented","description":"RFC 1945 adds headers, metadata, content types and richer semantics.","resource":"","timestamp":"1996-05-01T00:00:00Z","aliases":"","section":"document","body":"[RFC 1945](../../standards/http-1-0.md) (May 1996) made an HTTP exchange able to explain what happened, what was returned, how to interpret it, and what to try next. Method + resource + headers + status + content remain the foundation of most government APIs.\n\n**Evaluation:** accurate, correctly cited."},"document/timeline/1997-1999-http-1-1.md":{"type":"Timeline Event","title":"1997–1999 — HTTP/1.1 makes the Web scalable","description":"Caching, persistent connections, intermediaries, content negotiation.","resource":"","timestamp":"1999-06-01T00:00:00Z","aliases":"","section":"document","body":"[HTTP/1.1](../../standards/http-1-1.md) (RFC 2068 → RFC 2616) described HTTP as a generic, stateless, application-level protocol. Gave public services a shared architectural language: gateways, proxies, CDNs, audit and security controls.\n\n**Evaluation:** accurate; RFC 2616 is named but the draft links only RFC 2068.\n\n# Terms\nGlossary terms used here: [Statelessness](../../glossary/statelessness.md)."},"document/timeline/1998-2001-web-services-and-rest.md":{"type":"Timeline Event","title":"1998–2001 — Two traditions: web services and REST","description":"XML/SOAP/WSDL vs REST — overlapping problems at different levels.","resource":"","timestamp":"2000-05-08T00:00:00Z","aliases":"","section":"document","body":"[XML 1.0](../../standards/xml.md) (1998), [SOAP 1.1](../../standards/soap.md) (2000), [WSDL 1.1](../../standards/wsdl.md) (2001) emphasised messages, operations and explicit contracts; [REST](../../standards/rest.md) (Fielding, 2000) emphasised architectural properties. *\"SOAP bad, REST good\" is an inadequate account.*\n\n**Evaluation:** accurate; add SOAP and WSDL sources (draft cites only XML).\n\n# Terms\nGlossary terms used here: [Executable contract](../../glossary/contract.md), [Operation](../../glossary/operation.md)."},"document/timeline/2000-2006-apis-as-platforms.md":{"type":"Timeline Event","title":"2000–2006 — APIs become platforms","description":"eBay's APIs and JSON; the resource-oriented HTTP+JSON model emerges.","resource":"","timestamp":"2006-07-01T00:00:00Z","aliases":"","section":"document","body":"[eBay](../../organisations/ebay.md) launched APIs in **2000** (SOAP, partner-only). [JSON](../../standards/json.md) (RFC 4627, 2006; now RFC 8259) gave a lighter alternative. The dominant model became *HTTP semantics + resource URLs + JSON + developer docs* — simpler, though sometimes at the cost of schema/contract rigour.\n\n**Evaluation:** accurate; update JSON citation to RFC 8259 (tracked).\n\n# Terms\nGlossary terms used here: [Schema](../../glossary/schema.md), [Semantic interoperability](../../glossary/semantic-interoperability.md)."},"document/timeline/2012-delegated-authority-api-first.md":{"type":"Timeline Event","title":"2012 — Delegated authority and API-first government","description":"OAuth 2.0 and legislation.gov.uk's API-first architecture.","resource":"","timestamp":"2012-10-01T00:00:00Z","aliases":"","section":"document","body":"[OAuth 2.0](../../standards/oauth-2-0.md) (RFC 6749) enabled scoped delegated access. The same year, [legislation.gov.uk](../../uk-government/legislation-gov-uk-api.md) was built **API-first** — the API as the *\"beating heart\"*. API-first = treating the service boundary as a first-class product and contract.\n\n**Evaluation:** accurate; RFC 6749 added (tracked).\n\n# Terms\nGlossary terms used here: [Delegated authority](../../glossary/delegated-authority.md)."},"document/timeline/2014-2017-modern-api-ecosystem.md":{"type":"Timeline Event","title":"2014–2017 — The modern API ecosystem forms","description":"HTTP/2, OpenAPI, and architectural pluralism (GraphQL, gRPC, AsyncAPI).","resource":"","timestamp":"2015-11-01T00:00:00Z","aliases":"","section":"document","body":"HTTP/1.1 split into focused RFCs (2014); [HTTP/2](../../standards/http-2.md) (RFC 7540, 2015). The [OpenAPI Initiative](../../organisations/openapi-initiative.md) formed (Nov 2015); [OpenAPI 3.0](../../standards/openapi.md) (2017). Plus [GraphQL](../../standards/graphql.md), [gRPC](../../standards/grpc.md), [AsyncAPI](../../standards/asyncapi.md): *\"API\" no longer implied a single style.*\n\n**Evaluation:** accurate; fix the OpenAPI-Initiative link (Style Guide → /about); add gRPC source."},"document/timeline/2018-2019-uk-standardisation-events.md":{"type":"Timeline Event","title":"2018–2019 — UK standardisation and event interoperability","description":"GDS API standards, Open Standards Board OpenAPI 3, CloudEvents 1.0.","resource":"","timestamp":"2019-10-02T00:00:00Z","aliases":"","section":"document","body":"[GDS API standards](../../uk-government/gds-api-standards.md) (Feb 2018, REST + OpenAPI-first); [Open Standards Board](../../uk-government/open-standards-board-openapi3.md) recommended OpenAPI 3 (2019); [CloudEvents 1.0](../../standards/cloudevents.md) (Oct 2019) gave events a common envelope.\n\n**Evaluation:** accurate, correctly cited.\n\n# Terms\nGlossary terms used here: [Event envelope](../../glossary/event-envelope.md)."},"document/timeline/2021-2022-semantics-vs-wire.md":{"type":"Timeline Event","title":"2021–2022 — Semantics separated from the wire format","description":"RFC 9110 semantics; HTTP/1.1, /2, /3 as separate carriers.","resource":"","timestamp":"2022-06-01T00:00:00Z","aliases":"","section":"document","body":"[RFC 9110](../../standards/http-semantics.md) defines semantics; [HTTP/3](../../standards/http-3.md) maps them onto QUIC. **The enduring contract is the semantics; versions just carry it** — so *standardise durable semantics and outcomes, not infrastructure choices.*\n\n**Evaluation:** accurate; one of the document's best conceptual points.\n\n# Terms\nGlossary terms used here: [QUIC](../../glossary/quic.md), [Semantic interoperability](../../glossary/semantic-interoperability.md)."},"document/timeline/2023-2026-contracts-events-workflows.md":{"type":"Timeline Event","title":"2023–June 2026 — Contracts expand to events and workflows","description":"AsyncAPI 3.x, OpenAPI 3.2, Arazzo 1.1, OAuth BCP, MCP, A2A.","resource":"","timestamp":"2026-06-01T00:00:00Z","aliases":"","section":"document","body":"[AsyncAPI 3.0/3.1](../../standards/asyncapi.md), [OpenAPI 3.2](../../standards/openapi.md) (Sep 2025), [Arazzo 1.1](../../standards/arazzo.md) (2026), [OAuth BCP RFC 9700](../../standards/oauth-2-0-security-bcp.md) (2025), [MCP](../../standards/mcp.md) and [A2A](../../standards/a2a.md). MCP/A2A are **emerging**, not settled standards; they make API quality, authority and machine-readability *more* consequential.\n\n**Evaluation:** accurate; RFC 9700 added (tracked); add an Arazzo citation and confirm its month."},"document/timeline/index.md":{"type":"Index","title":"Timeline","description":"The era-by-era narrative (reviewed; corrections folded in).","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"document","body":"# Timeline\n\nThe era-by-era narrative (reviewed; corrections folded in).\n\n- [1989–1993 — The Web and the earliest HTTP](1989-1993-web-and-earliest-http.md) — CERN, the first browser/server, and HTTP/0.9; royalty-free release in 1993.\n- [1996 — HTTP/1.0 formally documented](1996-http-1-0.md) — RFC 1945 adds headers, metadata, content types and richer semantics.\n- [1997–1999 — HTTP/1.1 makes the Web scalable](1997-1999-http-1-1.md) — Caching, persistent connections, intermediaries, content negotiation.\n- [1998–2001 — Two traditions: web services and REST](1998-2001-web-services-and-rest.md) — XML/SOAP/WSDL vs REST — overlapping problems at different levels.\n- [2000–2006 — APIs become platforms](2000-2006-apis-as-platforms.md) — eBay's APIs and JSON; the resource-oriented HTTP+JSON model emerges.\n- [2012 — Delegated authority and API-first government](2012-delegated-authority-api-first.md) — OAuth 2.0 and legislation.gov.uk's API-first architecture.\n- [2014–2017 — The modern API ecosystem forms](2014-2017-modern-api-ecosystem.md) — HTTP/2, OpenAPI, and architectural pluralism (GraphQL, gRPC, AsyncAPI).\n- [2018–2019 — UK standardisation and event interoperability](2018-2019-uk-standardisation-events.md) — GDS API standards, Open Standards Board OpenAPI 3, CloudEvents 1.0.\n- [2021–2022 — Semantics separated from the wire format](2021-2022-semantics-vs-wire.md) — RFC 9110 semantics; HTTP/1.1, /2, /3 as separate carriers.\n- [2023–June 2026 — Contracts expand to events and workflows](2023-2026-contracts-events-workflows.md) — AsyncAPI 3.x, OpenAPI 3.2, Arazzo 1.1, OAuth BCP, MCP, A2A.\n\n# Terms\nGlossary terms used here: [Content negotiation](../../glossary/content-negotiation.md), [Delegated authority](../../glossary/delegated-authority.md), [Executable contract](../../glossary/contract.md), [Open standard](../../glossary/open-standard.md), [Semantic interoperability](../../glossary/semantic-interoperability.md), [Workflow](../../glossary/workflow.md)."},"glossary/automated-decision.md":{"type":"Glossary term","title":"Automated decision","description":"A decision made by automated processing, with little or no human involvement.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"automated decision; solely-automated decision; automated decision-making; automated decisions","section":"glossary","body":"# Definition\nA decision produced by **automated processing** rather than a person. Under the [Data (Use and Access) Act 2025](../uk-government/duaa-2025-adm.md), a **significant, solely-automated decision** (one with legal or similarly significant effect and no [meaningful human involvement](meaningful-human-involvement.md)) triggers safeguards: information, representations, human intervention and the right to contest.\n\n# Used in this bundle\nAppears in: [duaa-2025-adm](../uk-government/duaa-2025-adm.md), [legal-accountability-layer](../document/themes/legal-accountability-layer.md), [future-directions](../document/themes/future-directions.md).\n\n# Related terms\n[meaningful human involvement](meaningful-human-involvement.md), [redress](redress.md), [human in the loop](human-in-the-loop.md)."},"glossary/bearer-token.md":{"type":"Glossary term","title":"Bearer token","description":"A credential where mere possession grants access; if stolen it can be replayed.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"bearer token; bearer access; bearer","section":"glossary","body":"# Definition\nA **bearer token** is a credential where **mere possession grants access** (&#x201C;the bearer&#x201D;). If intercepted it can be replayed, which is why the document argues for moving toward demonstrable, proof-bound authority.\n\n# Used in this bundle\nAppears in: [oauth-2-0](../standards/oauth-2-0.md), [oauth-2-0-security-bcp](../standards/oauth-2-0-security-bcp.md), [future-directions](../document/themes/future-directions.md).\n\n# Related terms\n[delegated authority](delegated-authority.md), [workload identity](workload-identity.md)."},"glossary/binary-framing.md":{"type":"Glossary term","title":"Binary framing","description":"Encoding messages as compact binary frames rather than plain text.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"binary framing","section":"glossary","body":"# Definition\n**Binary framing** encodes HTTP messages as compact **binary frames** instead of plain text, which is what lets HTTP/2 multiplex many streams on one connection.\n\n# Used in this bundle\nAppears in: [http-2](../standards/http-2.md).\n\n# Related terms\n[multiplexing](multiplexing.md)."},"glossary/channel.md":{"type":"Glossary term","title":"Channel","description":"A named pathway (like a topic or queue) that messages flow through.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"channels; topic","section":"glossary","body":"# Definition\nIn messaging and AsyncAPI, a **channel** is a named pathway &#x2014; conceptually like a topic or queue &#x2014; that messages flow through. Producers publish to it and consumers subscribe to it.\n\n# Used in this bundle\nAppears in: [asyncapi](../standards/asyncapi.md).\n\n# Related terms\n[operation](operation.md), [message driven](message-driven.md)."},"glossary/content-negotiation.md":{"type":"Glossary term","title":"Content negotiation","description":"Client and server agree on the best representation (format/language) of a resource.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"content negotiation","section":"glossary","body":"# Definition\nThe mechanism by which client and server **agree on the best representation** of a resource &#x2014; format, language, encoding &#x2014; usually via HTTP headers such as Accept.\n\n# Used in this bundle\nAppears in: [http-1-1](../standards/http-1-1.md), [http-semantics](../standards/http-semantics.md).\n\n# Related terms\n[media type](media-type.md)."},"glossary/contract.md":{"type":"Glossary term","title":"Executable contract","description":"A machine-readable API description that documents it and drives validation, testing and code generation.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"executable contract; contracts; api contract","section":"glossary","body":"# Definition\nAn **executable contract** is a machine-readable description of an API (for example, [OpenAPI](../standards/openapi.md)) that both documents the interface and can **drive validation, testing and client generation** &#x2014; the document's &#x201C;prose to executable contracts&#x201D; shift.\n\n# Used in this bundle\nAppears in: [openapi](../standards/openapi.md), [asyncapi](../standards/asyncapi.md), [arazzo](../standards/arazzo.md).\n\n# Related terms\n[schema](schema.md), [workflow](workflow.md)."},"glossary/delegated-authority.md":{"type":"Glossary term","title":"Delegated authority","description":"Granting a third party limited permission to act on your behalf without sharing credentials.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"delegated authority; delegation; delegated access","section":"glossary","body":"# Definition\n**Delegated authority** means granting a third party **limited permission to act on your behalf without sharing your password** &#x2014; the central idea of OAuth.\n\n# Used in this bundle\nAppears in: [oauth-2-0](../standards/oauth-2-0.md), [2012-delegated-authority-api-first](../document/timeline/2012-delegated-authority-api-first.md).\n\n# Related terms\n[bearer token](bearer-token.md), [workload identity](workload-identity.md)."},"glossary/event-driven.md":{"type":"Glossary term","title":"Event-driven","description":"Producers emit events (notifications that something happened) and consumers react.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"event-oriented; event orientated; event driven; event-based","section":"glossary","body":"# Definition\nAn architecture in which **producers emit events** &#x2014; notifications that something has happened (an order was placed, a record changed) &#x2014; and **consumers react** to them. Producers and consumers are decoupled: the producer does not know who, if anyone, will respond. &#x201C;Event-oriented&#x201D; means the same thing.\n\n# Used in this bundle\nAppears in: [asyncapi](../standards/asyncapi.md), [cloudevents](../standards/cloudevents.md), [2018-2019-uk-standardisation-events](../document/timeline/2018-2019-uk-standardisation-events.md).\n\n# Related terms\n[message driven](message-driven.md), [event envelope](event-envelope.md), [channel](channel.md)."},"glossary/event-envelope.md":{"type":"Glossary term","title":"Event envelope","description":"A common metadata wrapper around an event so different systems handle it uniformly.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"event envelope; envelope","section":"glossary","body":"# Definition\nAn **event envelope** is a common **metadata wrapper** around an event &#x2014; id, type, time, source &#x2014; so different platforms can handle events uniformly. This is what [CloudEvents](../standards/cloudevents.md) standardises.\n\n# Used in this bundle\nAppears in: [cloudevents](../standards/cloudevents.md).\n\n# Related terms\n[event driven](event-driven.md), [message driven](message-driven.md)."},"glossary/human-in-the-loop.md":{"type":"Glossary term","title":"Human-in-the-loop","description":"A control requiring a person to review or approve before an automated action proceeds.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"human-in-the-loop; human oversight; human approval; human in the loop","section":"glossary","body":"# Definition\nA control that inserts a **person into the decision or action path** &#x2014; to review, approve or veto before an automated step proceeds. A proportionate, risk-tiered version is central to the document's agent-safety controls.\n\n# Used in this bundle\nAppears in: [future-directions](../document/themes/future-directions.md), [legal-accountability-layer](../document/themes/legal-accountability-layer.md).\n\n# Related terms\n[meaningful human involvement](meaningful-human-involvement.md), [automated decision](automated-decision.md), [redress](redress.md)."},"glossary/idempotency.md":{"type":"Glossary term","title":"Idempotency","description":"An operation that can be repeated safely with the same effect as doing it once.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"idempotent; safe retry","section":"glossary","body":"# Definition\nAn operation is **idempotent** if repeating it has the same effect as doing it once &#x2014; so a safe retry will not, say, charge a card twice. Important for reliable automation and agent actions.\n\n# Used in this bundle\nAppears in: [http-semantics](../standards/http-semantics.md), [future-directions](../document/themes/future-directions.md).\n\n# Related terms\n[statelessness](statelessness.md)."},"glossary/index.md":{"type":"Index","title":"Glossary","description":"Plain-English definitions of the technical and governance terms used across the bundle.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"glossary","body":"# Glossary\n\nPlain-English definitions of the terms that appear in the concept descriptions. Each links to the concepts it explains.\n\n- [Automated decision](automated-decision.md) — A decision made by automated processing, with little or no human involvement.\n- [Bearer token](bearer-token.md) — A credential where mere possession grants access; if stolen it can be replayed.\n- [Binary framing](binary-framing.md) — Encoding messages as compact binary frames rather than plain text.\n- [Channel](channel.md) — A named pathway (like a topic or queue) that messages flow through.\n- [Content negotiation](content-negotiation.md) — Client and server agree on the best representation (format/language) of a resource.\n- [Delegated authority](delegated-authority.md) — Granting a third party limited permission to act on your behalf without sharing credentials.\n- [Event envelope](event-envelope.md) — A common metadata wrapper around an event so different systems handle it uniformly.\n- [Event-driven](event-driven.md) — Producers emit events (notifications that something happened) and consumers react.\n- [Executable contract](contract.md) — A machine-readable API description that documents it and drives validation, testing and code generation.\n- [Human-in-the-loop](human-in-the-loop.md) — A control requiring a person to review or approve before an automated action proceeds.\n- [Idempotency](idempotency.md) — An operation that can be repeated safely with the same effect as doing it once.\n- [Meaningful human involvement](meaningful-human-involvement.md) — Genuine human review or agency in a decision, not a rubber-stamp.\n- [Media type](media-type.md) — A label such as application/json that identifies the format of content.\n- [Message-driven](message-driven.md) — Components communicate by sending discrete messages rather than calling each other directly.\n- [Multiplexing](multiplexing.md) — Carrying many independent streams over one connection at the same time.\n- [Open standard](open-standard.md) — A specification anyone may implement, typically vendor-neutral and royalty-free.\n- [Operation](operation.md) — A specific send or receive action on a channel.\n- [Provenance](provenance.md) — The recorded origin and history of data or an action.\n- [QUIC](quic.md) — A modern UDP-based transport underpinning HTTP/3 with independent streams.\n- [RPC](rpc.md) — Calling a function on another machine as if it were local.\n- [Redress](redress.md) — The route for a person to obtain explanation, human review and appeal.\n- [Request–response](request-response.md) — Call-and-wait: a client sends a request and waits for the server's reply.\n- [Schema](schema.md) — A formal description of the structure of data, used to validate and generate code.\n- [Semantic interoperability](semantic-interoperability.md) — Agreement not just on data format but on what the data means.\n- [Standards body](standards-body.md) — An organisation that develops and maintains technical standards.\n- [Statelessness](statelessness.md) — Each request carries everything needed; the server keeps no client session between requests.\n- [Workflow](workflow.md) — An ordered sequence of API calls with dependencies that together achieve an outcome.\n- [Workload identity](workload-identity.md) — A verifiable identity for software or workloads, not humans."},"glossary/meaningful-human-involvement.md":{"type":"Glossary term","title":"Meaningful human involvement","description":"Genuine human review or agency in a decision, not a rubber-stamp.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"meaningful human involvement; human involvement; meaningful human review","section":"glossary","body":"# Definition\nGenuine human **review, judgement or agency** in a decision &#x2014; not a token sign-off. It is the test that decides whether a decision counts as &#x201C;solely automated&#x201D; (and so whether the [automated-decision](automated-decision.md) safeguards apply).\n\n# Used in this bundle\nAppears in: [duaa-2025-adm](../uk-government/duaa-2025-adm.md), [legal-accountability-layer](../document/themes/legal-accountability-layer.md).\n\n# Related terms\n[automated decision](automated-decision.md), [human in the loop](human-in-the-loop.md)."},"glossary/media-type.md":{"type":"Glossary term","title":"Media type","description":"A label such as application/json that identifies the format of content.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"media type; MIME type; MIME; content type","section":"glossary","body":"# Definition\nA **media type** (historically a MIME type), such as application/json, labels the **format of content** so the recipient knows how to parse it.\n\n# Used in this bundle\nAppears in: [json](../standards/json.md), [http-1-0](../standards/http-1-0.md).\n\n# Related terms\n[schema](schema.md), [content negotiation](content-negotiation.md)."},"glossary/message-driven.md":{"type":"Glossary term","title":"Message-driven","description":"Components communicate by sending discrete messages rather than calling each other directly.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"message driven; messaging","section":"glossary","body":"# Definition\nA style of integration where parts of a system communicate by sending **discrete messages** (often asynchronously) to one another, instead of calling each other directly and waiting for an answer. It decouples sender and receiver in time and location.\n\n# Used in this bundle\nAppears in: [asyncapi](../standards/asyncapi.md), [cloudevents](../standards/cloudevents.md).\n\n# Related terms\n[event driven](event-driven.md), [channel](channel.md)."},"glossary/multiplexing.md":{"type":"Glossary term","title":"Multiplexing","description":"Carrying many independent streams over one connection at the same time.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"multiplexing; multiplexed","section":"glossary","body":"# Definition\n**Multiplexing** carries **many independent streams over a single connection at once**, so requests no longer queue behind one another. Introduced for HTTP/2 via [binary framing](binary-framing.md).\n\n# Used in this bundle\nAppears in: [http-2](../standards/http-2.md), [http-3](../standards/http-3.md).\n\n# Related terms\n[binary framing](binary-framing.md), [quic](quic.md)."},"glossary/open-standard.md":{"type":"Glossary term","title":"Open standard","description":"A specification anyone may implement, typically vendor-neutral and royalty-free.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"open standard; vendor-neutral; royalty-free; open specification","section":"glossary","body":"# Definition\nA specification that **anyone may implement without permission**, typically **vendor-neutral** and often **royalty-free** &#x2014; the property the document credits for the Web's growth (CERN's 1993 release) and for OpenAPI's adoption.\n\n# Used in this bundle\nAppears in: [cern](../organisations/cern.md), [openapi](../standards/openapi.md), [http-semantics](../standards/http-semantics.md), [openapi-initiative](../organisations/openapi-initiative.md).\n\n# Related terms\n[standards body](standards-body.md)."},"glossary/operation.md":{"type":"Glossary term","title":"Operation","description":"A specific send or receive action on a channel.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"operations; split operations; publish; subscribe","section":"glossary","body":"# Definition\nAn **operation** is a specific action on a [channel](channel.md) &#x2014; sending (publish) or receiving (subscribe) a message. When AsyncAPI 3.0 &#x201C;**split operations out of channels**&#x201D;, it began describing operations *separately* from the channels they use, removing the old ambiguity about which side sends and which receives.\n\n# Used in this bundle\nAppears in: [asyncapi](../standards/asyncapi.md).\n\n# Related terms\n[channel](channel.md), [contract](contract.md)."},"glossary/provenance.md":{"type":"Glossary term","title":"Provenance","description":"The recorded origin and history of data or an action.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"provenance; lineage","section":"glossary","body":"# Definition\n**Provenance** is the recorded **origin and history** of data or an action &#x2014; where it came from, who or what produced it &#x2014; essential for trust, audit and redress in agentic systems.\n\n# Used in this bundle\nAppears in: [future-directions](../document/themes/future-directions.md), [legal-accountability-layer](../document/themes/legal-accountability-layer.md).\n\n# Related terms\n[semantic interoperability](semantic-interoperability.md)."},"glossary/quic.md":{"type":"Glossary term","title":"QUIC","description":"A modern UDP-based transport underpinning HTTP/3 with independent streams.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"QUIC","section":"glossary","body":"# Definition\n**QUIC** is a modern transport built on UDP that underpins **HTTP/3**, providing independent streams and faster connection setup, and avoiding the head-of-line blocking of HTTP/2 over TCP.\n\n# Used in this bundle\nAppears in: [http-3](../standards/http-3.md).\n\n# Related terms\n[multiplexing](multiplexing.md)."},"glossary/redress.md":{"type":"Glossary term","title":"Redress","description":"The route for a person to obtain explanation, human review and appeal.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"redress; right to contest; appeal; remedy","section":"glossary","body":"# Definition\nThe route by which a person affected by a decision can obtain an **explanation, human review and appeal** (and, ultimately, judicial review). The document treats a clear redress route as a non-negotiable for agentic systems.\n\n# Used in this bundle\nAppears in: [legal-accountability-layer](../document/themes/legal-accountability-layer.md), [future-directions](../document/themes/future-directions.md), [duaa-2025-adm](../uk-government/duaa-2025-adm.md).\n\n# Related terms\n[automated decision](automated-decision.md), [provenance](provenance.md)."},"glossary/request-response.md":{"type":"Glossary term","title":"Request–response","description":"Call-and-wait: a client sends a request and waits for the server's reply.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"request-response; request response; synchronous; request/response","section":"glossary","body":"# Definition\nThe classic **call-and-wait** pattern: a client sends a request and blocks until the server returns a reply. Most HTTP/REST calls work this way. Contrast with [event-driven](event-driven.md) interaction, where no immediate reply is expected.\n\n# Used in this bundle\nAppears in: [rest](../standards/rest.md), [http-semantics](../standards/http-semantics.md).\n\n# Related terms\n[statelessness](statelessness.md), [event driven](event-driven.md)."},"glossary/rpc.md":{"type":"Glossary term","title":"RPC","description":"Calling a function on another machine as if it were local.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"RPC; remote procedure call","section":"glossary","body":"# Definition\n**RPC (remote procedure call)** means **calling a function on another machine as if it were local**. [gRPC](../standards/grpc.md) is a high-performance RPC framework using Protocol Buffers.\n\n# Used in this bundle\nAppears in: [grpc](../standards/grpc.md).\n\n# Related terms\n[contract](contract.md)."},"glossary/schema.md":{"type":"Glossary term","title":"Schema","description":"A formal description of the structure of data, used to validate and generate code.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"schemas; JSON Schema","section":"glossary","body":"# Definition\nA **schema** formally describes the **structure of data** &#x2014; its fields and types &#x2014; so data can be validated and code generated from it (for example, JSON Schema used by OpenAPI and Arazzo).\n\n# Used in this bundle\nAppears in: [openapi](../standards/openapi.md), [json](../standards/json.md), [arazzo](../standards/arazzo.md).\n\n# Related terms\n[contract](contract.md)."},"glossary/semantic-interoperability.md":{"type":"Glossary term","title":"Semantic interoperability","description":"Agreement not just on data format but on what the data means.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"semantic interoperability; semantics; shared meaning","section":"glossary","body":"# Definition\n**Semantic interoperability** is agreement **not just on data format but on what the data means** &#x2014; shared definitions and vocabularies &#x2014; so two systems genuinely understand each other. The document argues this matters more than syntactic consistency.\n\n# Used in this bundle\nAppears in: [future-directions](../document/themes/future-directions.md).\n\n# Related terms\n[schema](schema.md), [provenance](provenance.md)."},"glossary/standards-body.md":{"type":"Glossary term","title":"Standards body","description":"An organisation that develops and maintains technical standards.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"standards body; standards-setting organisation; standards organisation; standards-developing organisation","section":"glossary","body":"# Definition\nAn organisation that **develops, maintains and publishes technical standards**. The bodies behind the timeline include the [IETF](../organisations/ietf.md), [W3C](../organisations/w3c.md), the [OpenAPI Initiative](../organisations/openapi-initiative.md), [CNCF](../organisations/cncf.md) and the [Linux Foundation](../organisations/linux-foundation.md).\n\n# Used in this bundle\nAppears in: [ietf](../organisations/ietf.md), [w3c](../organisations/w3c.md), [openapi-initiative](../organisations/openapi-initiative.md), [cncf](../organisations/cncf.md), [linux-foundation](../organisations/linux-foundation.md).\n\n# Related terms\n[open standard](open-standard.md)."},"glossary/statelessness.md":{"type":"Glossary term","title":"Statelessness","description":"Each request carries everything needed; the server keeps no client session between requests.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"stateless; stateless protocol","section":"glossary","body":"# Definition\nA property where **each request carries everything needed** to process it and the server keeps no client session in between. It is a core REST/HTTP constraint that makes systems easier to scale and cache.\n\n# Used in this bundle\nAppears in: [rest](../standards/rest.md), [http-1-1](../standards/http-1-1.md), [http-semantics](../standards/http-semantics.md).\n\n# Related terms\n[idempotency](idempotency.md), [request response](request-response.md)."},"glossary/workflow.md":{"type":"Glossary term","title":"Workflow","description":"An ordered sequence of API calls with dependencies that together achieve an outcome.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"workflows; multi-step","section":"glossary","body":"# Definition\nA **workflow** is an ordered sequence of API calls, with their dependencies, that together achieve an outcome &#x2014; what [Arazzo](../standards/arazzo.md) describes. The document's example: &#x201C;tell government someone has died&#x201D; is a governed workflow, not one endpoint.\n\n# Used in this bundle\nAppears in: [arazzo](../standards/arazzo.md), [future-directions](../document/themes/future-directions.md).\n\n# Related terms\n[contract](contract.md), [operation](operation.md)."},"glossary/workload-identity.md":{"type":"Glossary term","title":"Workload identity","description":"A verifiable identity for software or workloads, not humans.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"workload identity; non-human identity; agent identity","section":"glossary","body":"# Definition\n**Workload identity** gives **software, services or agents a verifiable identity of their own** (distinct from any human user), so non-human actors can authenticate as themselves &#x2014; key to governing agentic systems.\n\n# Used in this bundle\nAppears in: [future-directions](../document/themes/future-directions.md), [legal-accountability-layer](../document/themes/legal-accountability-layer.md), [a2a](../standards/a2a.md).\n\n# Related terms\n[bearer token](bearer-token.md), [delegated authority](delegated-authority.md)."},"index.md":{"type":"Index","title":"api-mcp-wiki — From GET to agentic government (OKF bundle)","description":"An Open Knowledge Format bundle: the reviewed document, its evaluation, and every source as a cross-linked concept.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"root","body":"# api-mcp-wiki\n\nAn **Open Knowledge Format (OKF v0.1)** bundle for *From GET to agentic government*. OKF represents knowledge as a directory of markdown files with YAML frontmatter (`type`, `title`, `description`, `resource`, `tags`, `timestamp`) and markdown cross-links that turn the directory into a graph. This bundle is **just files** — readable in any editor, on GitHub, or via the included offline viewer.\n\n## Contents\n- **[The reviewed document](document/index.md)** — overview, [timeline](document/timeline/index.md), [themes](document/themes/index.md), and the [peer review](document/peer-review.md).\n- **[Sources index](sources-index.md)** — every source mentioned, with verified citations.\n- **[Standards & specifications](standards/index.md)** — 21 concepts.\n- **[UK government sources](uk-government/index.md)** — 11 concepts.\n- **[Glossary](glossary/index.md)** — plain-English definitions of technical terms.\n- **[Organisations](organisations/index.md)** — 11 concepts.\n- **[Change log / provenance](log.md)**\n\n## How to use\nOpen **`viewer.html`** for an interactive graph + browser (no install, works offline), or read the markdown directly. Each concept links to related concepts; follow the links to explore.\n\n## Linking conventions\n\nOKF v0.1 links are plain markdown — **unidirectional and untyped**. This bundle adopts two conventions the spec leaves open:\n\n1. **Glossary/vocabulary** terms are linked **from the concept that uses them** (a `Terms` section at the foot of each concept), mirroring wiki practice; each glossary entry also lists where it is used, so the term↔concept relationship is bidirectional in the files.\n2. **Direction is meaningful** (a link means *source references target*); consumers build the reverse index (the viewer's \"Referenced by\"). Relationship *types* (defines, stewards, introduces, adopts…) are inferred by the viewer from section + direction.\n\n**Organisations** carry few glossary links by design — they are actors / standards bodies, not described by technical vocabulary; they connect to the vocabulary via the standards they steward. **UK-government** pages use policy/legal language, so they link to the governance terms (automated decision, meaningful human involvement, redress) and otherwise reach the vocabulary through the standards they adopt.\n\n## Verdict\nThe document is **accept with minor revisions** — accurate and well-structured; revisions concern citation hygiene and one substantive gap (the legal/accountability layer). See the [peer review](document/peer-review.md).\n\n# Terms\nGlossary terms used here: [Provenance](glossary/provenance.md)."},"log.md":{"type":"Log","title":"Change log & provenance","description":"How this bundle was produced and verified.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"root","body":"# Change log & provenance\n\n- **2026-06-20** — Bundle created from *From GET to Agentic Government.docx*. All 59 source/content concepts authored; every dated/version claim verified against primary sources (accessed 20 June 2026).\n- **Source document provenance:** GPT-5.5-Pro (author); Opus 4.8 (review); Approval/Authorisation: none.\n- **Evaluation:** independent peer review by Claude (Opus 4.8). Verdict: accept with minor revisions. See [peer review](document/peer-review.md).\n- **Format:** Open Knowledge Format v0.1 (Google Cloud, June 2026) — markdown + YAML frontmatter; cross-links form the graph.\n- **Note:** several citations in the source draft carried `?utm_source=chatgpt.com`; URLs here are cleaned and verified.\n\n# Terms\nGlossary terms used here: [Provenance](glossary/provenance.md).\n- **2026-06-22** — Added concept&#x2192;glossary `Terms` links (usage&#x2192;definition direction) across 28+ concepts, and 6 governance/standards glossary terms (automated decision, meaningful human involvement, human-in-the-loop, redress, standards body, open standard) so UK-government and organisations connect to the vocabulary. Documented linking conventions; noted OKF v0.1 has no native bidirectional or typed links (consumers build the reverse index)."},"organisations/anthropic.md":{"type":"Organisation","title":"Anthropic","description":"Introduced the Model Context Protocol (2024).","resource":"https://www.anthropic.com/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"Introduced **[MCP](../standards/mcp.md)** in November 2024."},"organisations/cern.md":{"type":"Organisation","title":"CERN","description":"Birthplace of the Web; released Web technology royalty-free in 1993.","resource":"https://home.cern/science/computing/birth-web/short-history-web","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"Tim Berners-Lee proposed the Web at **CERN** (1989); CERN placed the Web in the public domain on **30 April 1993**, the decision the document credits for the Web's open expansion."},"organisations/cncf.md":{"type":"Organisation","title":"CNCF","description":"Cloud Native Computing Foundation; home of CloudEvents.","resource":"https://www.cncf.io/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"The **CNCF** stewards [CloudEvents](../standards/cloudevents.md) and hosts gRPC."},"organisations/dsit.md":{"type":"Organisation","title":"DSIT","description":"UK department behind the 2025 Blueprint for modern digital government.","resource":"https://www.gov.uk/government/organisations/department-for-science-innovation-and-technology","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"The **Department for Science, Innovation and Technology** published the **[Blueprint for modern digital government](../uk-government/blueprint-modern-digital-government.md)** (Jan 2025)."},"organisations/ebay.md":{"type":"Organisation","title":"eBay Inc.","description":"Early commercial API platform (2000).","resource":"https://innovation.ebayinc.com/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"Launched its first (SOAP-based, partner-restricted) **APIs in 2000** — the document's example of APIs becoming a commercial platform boundary."},"organisations/gds.md":{"type":"Organisation","title":"Government Digital Service (GDS)","description":"UK API-first pioneer; author of cross-government API standards.","resource":"https://www.gov.uk/government/organisations/government-digital-service","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"Built the API-first **[legislation.gov.uk](../uk-government/legislation-gov-uk-api.md)** (2012) and first published the **[API technical and data standards](../uk-government/gds-api-standards.md)** (Feb 2018)."},"organisations/graphql-foundation.md":{"type":"Organisation","title":"GraphQL Foundation","description":"Stewards the GraphQL specification.","resource":"https://graphql.org/foundation/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"Hosts **[GraphQL](../standards/graphql.md)** (open-sourced 2015)."},"organisations/ietf.md":{"type":"Organisation","title":"IETF / RFC Editor","description":"Publishes the HTTP, JSON and OAuth RFCs.","resource":"https://www.rfc-editor.org/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"The **IETF** (via the RFC Editor) publishes [HTTP](../standards/http-semantics.md), [JSON](../standards/json.md) and [OAuth](../standards/oauth-2-0.md) RFCs cited throughout the timeline."},"organisations/index.md":{"type":"Index","title":"Organisations","description":"Bodies that author or steward the standards and publications.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"# Organisations\n\nBodies that author or steward the standards and publications.\n\n- [CERN](cern.md) — Birthplace of the Web; released Web technology royalty-free in 1993.\n- [W3C](w3c.md) — Standards body for XML, SOAP, WSDL and core Web specs.\n- [IETF / RFC Editor](ietf.md) — Publishes the HTTP, JSON and OAuth RFCs.\n- [OpenAPI Initiative](openapi-initiative.md) — Linux Foundation project for OpenAPI, Arazzo and Overlay specs.\n- [CNCF](cncf.md) — Cloud Native Computing Foundation; home of CloudEvents.\n- [Linux Foundation](linux-foundation.md) — Hosts the OpenAPI Initiative and the A2A project.\n- [Government Digital Service (GDS)](gds.md) — UK API-first pioneer; author of cross-government API standards.\n- [DSIT](dsit.md) — UK department behind the 2025 Blueprint for modern digital government.\n- [eBay Inc.](ebay.md) — Early commercial API platform (2000).\n- [Anthropic](anthropic.md) — Introduced the Model Context Protocol (2024).\n- [GraphQL Foundation](graphql-foundation.md) — Stewards the GraphQL specification.\n\n# Terms\nGlossary terms used here: [Open standard](../glossary/open-standard.md), [Standards body](../glossary/standards-body.md)."},"organisations/linux-foundation.md":{"type":"Organisation","title":"Linux Foundation","description":"Hosts the OpenAPI Initiative and the A2A project.","resource":"https://www.linuxfoundation.org/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"Open-source/open-standards home; took **[A2A](../standards/a2a.md)** under governance in June 2025 and hosts the [OpenAPI Initiative](openapi-initiative.md)."},"organisations/openapi-initiative.md":{"type":"Organisation","title":"OpenAPI Initiative","description":"Linux Foundation project for OpenAPI, Arazzo and Overlay specs.","resource":"https://www.openapis.org/about","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"Formed **November 2015**; maintains [OpenAPI](../standards/openapi.md), [Arazzo](../standards/arazzo.md) and Overlay. The draft mis-links its formation to the Style Guide — cite openapis.org/about."},"organisations/w3c.md":{"type":"Organisation","title":"W3C","description":"Standards body for XML, SOAP, WSDL and core Web specs.","resource":"https://www.w3.org/","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"organisations","body":"The **World Wide Web Consortium** published [XML 1.0](../standards/xml.md), [SOAP 1.1](../standards/soap.md) and [WSDL 1.1](../standards/wsdl.md)."},"sources-index.md":{"type":"Index","title":"Sources index","description":"Every source mentioned in the document, as OKF concepts, with verified citations.","resource":"","timestamp":"2026-06-20T00:00:00Z","aliases":"","section":"root","body":"# Sources index\n\nAll sources named in *From GET to agentic government*, captured as concepts with verified citations (accessed 20 June 2026). Status flags: ✅ correct as cited · ⚠️ citation needs a fix/addition.\n\n\n## Standards & specifications\n\n- ✅ [Agent2Agent (A2A)](standards/a2a.md) — <https://www.linuxfoundation.org/press/linux-foundation-launches-the-agent2agent-protocol-project-to-enable-secure-intelligent-communication-between-ai-agents>\n- ⚠️ [Arazzo 1.1 (2026)](standards/arazzo.md) — <https://spec.openapis.org/arazzo/v1.1.0.html>\n- ✅ [AsyncAPI (3.0 2023 · 3.1 Jan 2026)](standards/asyncapi.md) — <https://www.asyncapi.com/blog/release-notes-3.1.0>\n- ✅ [CloudEvents 1.0 (CNCF, Oct 2019)](standards/cloudevents.md) — <https://www.cncf.io/announcements/2019/10/28/serverless-specification-cloudevents-reaches-version-1-0/>\n- ✅ [GraphQL (open-sourced 2015)](standards/graphql.md) — <https://graphql.org/>\n- ✅ [HTTP Semantics — RFC 9110 (2022)](standards/http-semantics.md) — <https://www.rfc-editor.org/info/rfc9110>\n- ⚠️ [HTTP/0.9 (1991)](standards/http-0-9.md) — <https://www.w3.org/Protocols/HTTP/AsImplemented.html>\n- ✅ [HTTP/1.0 — RFC 1945 (May 1996)](standards/http-1-0.md) — <https://www.rfc-editor.org/info/rfc1945>\n- ✅ [HTTP/1.1 — RFC 2068 / 2616 / 9112](standards/http-1-1.md) — <https://www.rfc-editor.org/info/rfc2616>\n- ✅ [HTTP/2 — RFC 7540 (2015)](standards/http-2.md) — <https://www.rfc-editor.org/info/rfc7540>\n- ✅ [HTTP/3 — RFC 9114 (2022)](standards/http-3.md) — <https://www.rfc-editor.org/info/rfc9114>\n- ⚠️ [JSON — RFC 4627 → RFC 8259 (STD 90)](standards/json.md) — <https://www.rfc-editor.org/info/rfc8259>\n- ✅ [Model Context Protocol (MCP)](standards/mcp.md) — <https://modelcontextprotocol.io/specification/2025-11-25>\n- ✅ [OAuth 2.0 Security BCP — RFC 9700 (Jan 2025)](standards/oauth-2-0-security-bcp.md) — <https://www.rfc-editor.org/info/rfc9700>\n- ✅ [OAuth 2.0 — RFC 6749 (2012)](standards/oauth-2-0.md) — <https://www.rfc-editor.org/info/rfc6749>\n- ⚠️ [OpenAPI (3.0 2017 · 3.2 Sept 2025)](standards/openapi.md) — <https://spec.openapis.org/oas/v3.2.0.html>\n- ✅ [REST — Fielding dissertation (2000)](standards/rest.md) — <https://www.ics.uci.edu/~fielding/pubs/dissertation/top.htm>\n- ⚠️ [SOAP 1.1 (W3C Note, May 2000)](standards/soap.md) — <https://www.w3.org/TR/2000/NOTE-SOAP-20000508>\n- ⚠️ [WSDL 1.1 (W3C Note, March 2001)](standards/wsdl.md) — <https://www.w3.org/TR/2001/NOTE-wsdl-20010315>\n- ✅ [XML 1.0 (W3C, Feb 1998)](standards/xml.md) — <https://www.w3.org/TR/1998/REC-xml-19980210>\n- ⚠️ [gRPC](standards/grpc.md) — <https://grpc.io/>\n\n## UK government sources\n\n- ✅ [API Hub alpha (2025)](uk-government/api-hub-alpha.md) — <https://dataingovernment.blog.gov.uk/2025/11/28/strengthening-and-extending-connectivity-what-we-learned-from-the-api-hub-alpha/>\n- ✅ [Algorithmic Transparency Recording Standard (ATRS)](uk-government/atrs.md) — <https://www.gov.uk/government/collections/algorithmic-transparency-recording-standard-hub>\n- ✅ [Blueprint for modern digital government (Jan 2025)](uk-government/blueprint-modern-digital-government.md) — <https://www.gov.uk/government/publications/a-blueprint-for-modern-digital-government>\n- ✅ [Cross-government API discovery (April 2025)](uk-government/api-discovery-2025.md) — <https://dataingovernment.blog.gov.uk/2025/04/03/joining-up-the-dots-the-findings-of-our-recent-api-discovery/>\n- ✅ [DPIA & data protection by design (UK GDPR Arts 35, 25)](uk-government/dpia-uk-gdpr.md) — <https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/accountability-and-governance/data-protection-impact-assessments-dpias/>\n- ✅ [Data (Use and Access) Act 2025 — automated decisions (Arts 22A–22D)](uk-government/duaa-2025-adm.md) — <https://www.legislation.gov.uk/ukpga/2025/18/part/5/chapter/1/crossheading/automated-decisionmaking>\n- ✅ [GDS API technical and data standards (Feb 2018)](uk-government/gds-api-standards.md) — <https://www.gov.uk/guidance/gds-api-technical-and-data-standards>\n- ✅ [GOV.UK API Catalogue](uk-government/api-catalogue.md) — <https://www.api.gov.uk/>\n- ✅ [Open Standards Board — OpenAPI 3 (2019)](uk-government/open-standards-board-openapi3.md) — <https://technology.blog.gov.uk/2019/10/02/improve-csvs-and-api-descriptions-with-these-open-standards-board-recommendations/>\n- ✅ [Public Sector Equality Duty (Equality Act 2010, s.149)](uk-government/equality-act-psed.md) — <https://www.legislation.gov.uk/ukpga/2010/15/section/149>\n- ✅ [legislation.gov.uk — API-first (2012)](uk-government/legislation-gov-uk-api.md) — <https://gds.blog.gov.uk/2012/03/30/putting-apis-first-legislation-gov-uk/>\n\n## Organisations\n\n- ✅ [Anthropic](organisations/anthropic.md) — <https://www.anthropic.com/>\n- ✅ [CERN](organisations/cern.md) — <https://home.cern/science/computing/birth-web/short-history-web>\n- ✅ [CNCF](organisations/cncf.md) — <https://www.cncf.io/>\n- ✅ [DSIT](organisations/dsit.md) — <https://www.gov.uk/government/organisations/department-for-science-innovation-and-technology>\n- ✅ [Government Digital Service (GDS)](organisations/gds.md) — <https://www.gov.uk/government/organisations/government-digital-service>\n- ✅ [GraphQL Foundation](organisations/graphql-foundation.md) — <https://graphql.org/foundation/>\n- ✅ [IETF / RFC Editor](organisations/ietf.md) — <https://www.rfc-editor.org/>\n- ✅ [Linux Foundation](organisations/linux-foundation.md) — <https://www.linuxfoundation.org/>\n- ✅ [OpenAPI Initiative](organisations/openapi-initiative.md) — <https://www.openapis.org/about>\n- ✅ [W3C](organisations/w3c.md) — <https://www.w3.org/>\n- ✅ [eBay Inc.](organisations/ebay.md) — <https://innovation.ebayinc.com/>\n\n# Terms\nGlossary terms used here: [Automated decision](glossary/automated-decision.md), [Semantic interoperability](glossary/semantic-interoperability.md)."},"standards/a2a.md":{"type":"Protocol","title":"Agent2Agent (A2A)","description":"Emerging protocol for communication and collaboration between AI agents.","resource":"https://www.linuxfoundation.org/press/linux-foundation-launches-the-agent2agent-protocol-project-to-enable-secure-intelligent-communication-between-ai-agents","timestamp":"2025-06-23T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**A2A** was placed under **Linux Foundation** governance on **23 June 2025** — an emerging protocol for agent-to-agent discovery, secure exchange and collaboration.\n\n# Evaluation\nAccurate and correctly cited; rightly framed as emerging. Relates to: [MCP](mcp.md), [Linux Foundation](../organisations/linux-foundation.md)."},"standards/arazzo.md":{"type":"Specification","title":"Arazzo 1.1 (2026)","description":"Describes sequences of API calls and their dependencies (workflows).","resource":"https://spec.openapis.org/arazzo/v1.1.0.html","timestamp":"2026-04-15T00:00:00Z","aliases":"","section":"standards","body":"# What it is\nThe **Arazzo Specification** describes multi-step workflows across OpenAPI- and AsyncAPI-described APIs, human- and machine-readable. **v1.1.0** adds **AsyncAPI support** and OpenAPI 3.2 alignment.\n\n# In the document\nCited for \"individual operations → whole outcomes\" — e.g. \"tell government someone has died\" as a governed *sequence*.\n\n# Evaluation\nConcept accurate. **Two fixes:** (1) it is the only timeline item with **no hyperlink** — add one; (2) the draft says \"May 2026\" but the published **v1.1 schema iteration is dated 2026-04-15** — confirm the month. Relates to: [OpenAPI](openapi.md), [AsyncAPI](asyncapi.md), [Future directions](../document/themes/future-directions.md).\n\n# Terms\nGlossary terms used here: [Operation](../glossary/operation.md), [Schema](../glossary/schema.md), [Workflow](../glossary/workflow.md)."},"standards/asyncapi.md":{"type":"Specification","title":"AsyncAPI (3.0 2023 · 3.1 Jan 2026)","description":"Describes message-driven and event-oriented APIs.","resource":"https://www.asyncapi.com/blog/release-notes-3.1.0","timestamp":"2026-01-31T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**AsyncAPI** (created 2017) describes event-driven APIs. **3.0** (Nov 2023) split operations out of channels; **3.1.0** shipped **31 January 2026**.\n\n# In the document\nAnchors \"synchronous requests → events and streams\", alongside [CloudEvents](cloudevents.md).\n\n# Evaluation\nAccurate. Relates to: [Arazzo](arazzo.md), [CloudEvents](cloudevents.md), [OpenAPI](openapi.md).\n\n# Terms\nGlossary terms used here: [Channel](../glossary/channel.md), [Event-driven](../glossary/event-driven.md), [Operation](../glossary/operation.md), [Request–response](../glossary/request-response.md)."},"standards/cloudevents.md":{"type":"Specification","title":"CloudEvents 1.0 (CNCF, Oct 2019)","description":"Common metadata envelope for events across platforms and transports.","resource":"https://www.cncf.io/announcements/2019/10/28/serverless-specification-cloudevents-reaches-version-1-0/","timestamp":"2019-10-28T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**CloudEvents 1.0** reached version 1.0 on **28 October 2019** (CNCF), giving events a common envelope so every producer need not invent its own.\n\n# Evaluation\nAccurate and correctly cited. Relates to: [AsyncAPI](asyncapi.md), [CNCF](../organisations/cncf.md).\n\n# Terms\nGlossary terms used here: [Event envelope](../glossary/event-envelope.md)."},"standards/graphql.md":{"type":"Specification","title":"GraphQL (open-sourced 2015)","description":"Typed query language letting consumers request exactly the data they need.","resource":"https://graphql.org/","timestamp":"2015-01-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**GraphQL** — used at Facebook from 2012, open-sourced 2015. Part of the document's \"architectural pluralism\": \"API\" no longer implies one interaction style.\n\n# Evaluation\nAccurate. Relates to: [gRPC](grpc.md), [OpenAPI](openapi.md)."},"standards/grpc.md":{"type":"Specification","title":"gRPC","description":"High-performance RPC over Protocol Buffers, suited to internal service-to-service and streaming.","resource":"https://grpc.io/","timestamp":"2015-01-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**gRPC** — high-performance RPC using Protocol Buffers; favoured for internal service-to-service communication and streaming.\n\n# Evaluation\nAccurate; **uncited in the draft** — add grpc.io. Relates to: [GraphQL](graphql.md), [AsyncAPI](asyncapi.md).\n\n# Terms\nGlossary terms used here: [RPC](../glossary/rpc.md)."},"standards/http-0-9.md":{"type":"Specification","title":"HTTP/0.9 (1991)","description":"The original, minimal HTTP: a request for a document followed by the document itself.","resource":"https://www.w3.org/Protocols/HTTP/AsImplemented.html","timestamp":"1991-01-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\nThe earliest HTTP, retrospectively named **0.9**. A single-line request returns a document with **no status codes, content types, headers, authentication or metadata**. HTTP began as a *document-retrieval* protocol, not an API platform.\n\n# In the document\nOpens the timeline (1989–1993). Establishes the recurring theme that **openness and implementability mattered more than sophistication**.\n\n# Evaluation (peer review)\nAccurate. **Citation fix needed:** the source draft links this to RFC 2068 (which is HTTP/1.1). Cite W3C *\"The Original HTTP as defined in 1991\"* or RFC 1945 §1.2.\n\nRelates to: [HTTP/1.0](http-1-0.md), [HTTP Semantics](http-semantics.md), [W3C](../organisations/w3c.md).\n\n# Terms\nGlossary terms used here: [Semantic interoperability](../glossary/semantic-interoperability.md)."},"standards/http-1-0.md":{"type":"Specification","title":"HTTP/1.0 — RFC 1945 (May 1996)","description":"First documented HTTP: MIME-like messages, headers, metadata, content types, richer semantics.","resource":"https://www.rfc-editor.org/info/rfc1945","timestamp":"1996-05-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**RFC 1945** (May 1996) documented HTTP/1.0, turning an exchange from \"fetch this file\" into a structured message able to say *what happened, what was returned, how to interpret it, and what to try next*.\n\n# In the document\nMarks the point where method + resource + headers + status + content became the foundation that most government APIs still rest on.\n\n# Evaluation\nAccurate and correctly cited. Relates to: [HTTP/0.9](http-0-9.md), [HTTP/1.1](http-1-1.md), [IETF](../organisations/ietf.md)."},"standards/http-1-1.md":{"type":"Specification","title":"HTTP/1.1 — RFC 2068 / 2616 / 9112","description":"Made the Web scalable: caching, persistent connections, intermediaries, content negotiation.","resource":"https://www.rfc-editor.org/info/rfc2616","timestamp":"1999-06-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\nFirst standards-track HTTP/1.1 = **RFC 2068 (Jan 1997)**, revised as **RFC 2616 (June 1999)**, later restated as **RFC 9112 (2022)**. Described HTTP as a *generic, stateless, application-level* protocol for distributed systems.\n\n# In the document\n\"Government relevance\": shared architectural language — gateways, proxies, CDNs, audit, security controls — without every system sharing an implementation.\n\n# Evaluation\nAccurate. Minor: the draft's single citation points only to RFC 2068; RFC 2616 is named but unlinked. Relates to: [HTTP Semantics](http-semantics.md), [HTTP/2](http-2.md).\n\n# Terms\nGlossary terms used here: [Semantic interoperability](../glossary/semantic-interoperability.md), [Statelessness](../glossary/statelessness.md)."},"standards/http-2.md":{"type":"Specification","title":"HTTP/2 — RFC 7540 (2015)","description":"Binary framing and multiplexing while retaining HTTP application semantics.","resource":"https://www.rfc-editor.org/info/rfc7540","timestamp":"2015-05-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**HTTP/2 (RFC 7540, May 2015; restated RFC 9113, 2022)** introduced binary framing and multiplexing over a single connection.\n\n# Evaluation\nAccurate; RFC number added as a tracked change in the reviewed file. Relates to: [HTTP Semantics](http-semantics.md), [HTTP/3](http-3.md).\n\n# Terms\nGlossary terms used here: [Binary framing](../glossary/binary-framing.md), [Multiplexing](../glossary/multiplexing.md), [Semantic interoperability](../glossary/semantic-interoperability.md)."},"standards/http-3.md":{"type":"Specification","title":"HTTP/3 — RFC 9114 (2022)","description":"Maps HTTP semantics onto QUIC, with independent streams.","resource":"https://www.rfc-editor.org/info/rfc9114","timestamp":"2022-06-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**HTTP/3 (RFC 9114, 2022)** carries the same HTTP semantics over **QUIC**, avoiding transport-level head-of-line blocking seen with HTTP/2 over TCP.\n\n# Evaluation\nAccurate and correctly cited. Relates to: [HTTP Semantics](http-semantics.md).\n\n# Terms\nGlossary terms used here: [QUIC](../glossary/quic.md), [Semantic interoperability](../glossary/semantic-interoperability.md)."},"standards/http-semantics.md":{"type":"Specification","title":"HTTP Semantics — RFC 9110 (2022)","description":"Separates durable HTTP semantics from the wire formats that carry them.","resource":"https://www.rfc-editor.org/info/rfc9110","timestamp":"2022-06-01T00:00:00Z","aliases":"","section":"standards","body":"# What it is\n**RFC 9110 (Ju
